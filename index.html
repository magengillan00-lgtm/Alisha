<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicia AI Ultimate</title>

<style>
body { margin:0; overflow:hidden; background:#111; font-family:sans-serif; }
canvas { width:100vw; height:100vh; display:block; }

#controls {
position:fixed; bottom:20px; left:50%;
transform:translateX(-50%);
display:flex; width:90%; max-width:500px;
}

#msg {
flex:1; padding:12px; border-radius:20px;
border:none; background:#222; color:white;
}

#send {
width:60px; border:none; border-radius:50%;
background:#3498db; color:white; font-size:20px;
}

#bubble {
position:fixed; top:50px; left:50%;
transform:translateX(-50%);
background:#000a; color:white;
padding:15px; border-radius:20px;
display:none;
}
</style>
</head>

<body>

<div id="bubble"></div>

<div id="controls">
<input id="msg" placeholder="Type or speak...">
<button id="send">🎤</button>
</div>

<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
"@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRMLoaderPlugin } from '@pixiv/three-vrm';

let OR_KEY = "";
let MEMORY = [];
let state = "idle";

let scene, camera, renderer, clock, vrm;

const msg = document.getElementById("msg");
const btn = document.getElementById("send");
const bubble = document.getElementById("bubble");

// ================= INIT =================
scene = new THREE.Scene();
clock = new THREE.Clock();

camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1,100);
camera.position.set(0,1.5,0.6);

renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

new OrbitControls(camera, renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(1,2,3);
scene.add(light);

// ================= LOAD MODEL =================
const loader = new GLTFLoader();
loader.register(parser=>new VRMLoaderPlugin(parser));

loader.load("./assets/models/waifu.vrm", gltf=>{
vrm = gltf.userData.vrm;
scene.add(vrm.scene);
});

// ================= ANIMATION =================
function animate(){
requestAnimationFrame(animate);

if(vrm){
const t = Date.now()*0.002;

const head = vrm.humanoid.getBoneNode('head');
const l = vrm.humanoid.getBoneNode('leftUpperArm');
const r = vrm.humanoid.getBoneNode('rightUpperArm');

if(state==="idle"){
if(head) head.rotation.y=Math.sin(t)*0.05;
}

if(state==="talk"){
if(head) head.rotation.y=Math.sin(t)*0.2;
if(l) l.rotation.z=Math.sin(t)*0.3;
if(r) r.rotation.z=-Math.sin(t)*0.3;
}

if(state==="wave"){
if(r) r.rotation.z=Math.sin(t*3)*0.8;
}
}

renderer.render(scene,camera);
}
animate();

// ================= LIP SYNC =================
let lip;

function startTalk(){
state="talk";
lip=setInterval(()=>{
if(vrm?.expressionManager){
vrm.expressionManager.setValue('aa', Math.random()*0.5);
}
},120);
}

function stopTalk(){
state="idle";
clearInterval(lip);
if(vrm?.expressionManager){
vrm.expressionManager.setValue('aa',0);
}
}

// ================= EMOTION =================
function emotion(text){
if(text.includes("love")) return "happy";
if(text.includes("angry")) return "angry";
return "neutral";
}

function applyEmotion(e){
if(!vrm?.expressionManager) return;

vrm.expressionManager.setValue('happy',0);
vrm.expressionManager.setValue('angry',0);

if(e==="happy") vrm.expressionManager.setValue('happy',1);
if(e==="angry") vrm.expressionManager.setValue('angry',1);
}

// ================= AI =================
async function ask(text){

show("Thinking...");

const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+OR_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"google/gemini-2.0-flash-001",
messages:[
...MEMORY,
{role:"user",content:text}
]
})
});

const data = await res.json();
const reply = data.choices[0].message.content;

MEMORY.push({role:"user",content:text});
MEMORY.push({role:"assistant",content:reply});

if(MEMORY.length>20) MEMORY=MEMORY.slice(-20);

applyEmotion(emotion(reply));
speak(reply);
show(reply);
}

// ================= SPEAK =================
function speak(t){
const u = new SpeechSynthesisUtterance(t);
u.lang="ja-JP";

u.onstart=startTalk;
u.onend=stopTalk;

speechSynthesis.speak(u);
}

// ================= UI =================
function show(t){
bubble.innerText=t;
bubble.style.display="block";
setTimeout(()=>bubble.style.display="none",5000);
}

msg.addEventListener("input",()=>{
btn.textContent = msg.value ? "➤":"🎤";
});

btn.onclick=()=>{
if(msg.value){
ask(msg.value);
msg.value="";
}else{
recognition.start();
}
};

// ================= MIC =================
const recognition = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="ar";

recognition.onresult=e=>{
msg.value = e.results[0][0].transcript;
};

recognition.onend=()=>{
if(msg.value){
ask(msg.value);
msg.value="";
}
};
</script>

</body>
</html>
