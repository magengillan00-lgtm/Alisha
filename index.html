<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alicia AI - Live2D Avatar</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(15, 12, 41, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 16px;
            color: #ddd;
            text-align: center;
            max-width: 300px;
        }

        #loading-error {
            font-size: 14px;
            color: #ff6b9d;
            margin-top: 10px;
            display: none;
        }

        #speech-bubble {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 24px;
            border-radius: 20px;
            max-width: 80%;
            min-width: 200px;
            text-align: center;
            font-size: 16px;
            line-height: 1.6;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        #speech-bubble.visible { opacity: 1; }

        #controls-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        #text-input {
            width: 280px;
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #text-input:focus { border-color: #ff6b9d; }
        #text-input::placeholder { color: rgba(255,255,255,0.5); }

        .ctrl-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: scale(1.05);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .ctrl-btn.recording {
            background: rgba(255, 0, 0, 0.7);
            border-color: #ff4444;
            animation: pulse-record 1s ease-in-out infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); }
        }

        #status-bar {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 5px 14px;
            border-radius: 12px;
        }

        #api-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.2);
        }

        .modal-content h2 { color: white; margin-bottom: 20px; }
        .modal-content p { color: #ccc; margin-bottom: 15px; font-size: 14px; }
        .modal-content a { color: #ff6b9d; text-decoration: none; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #0f0c29;
            color: white;
            font-size: 14px;
        }
        .modal-content button {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .modal-content button:hover { background: #ff5080; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #text-input { width: 200px; font-size: 14px; padding: 12px 16px; }
            .ctrl-btn { width: 45px; height: 45px; font-size: 18px; }
            #speech-bubble { font-size: 14px; max-width: 90%; padding: 10px 18px; }
        }
    </style>
</head>
<body>

    <div id="api-modal" class="hidden">
        <div class="modal-content">
            <h2>مفتاح Gemini API</h2>
            <p>يرجى إدخال مفتاح API الخاص بك للمتابعة</p>
            <p style="font-size: 12px; color: #999;">احصل على مفتاح مجاني من <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
            <input type="password" id="api-key-input" placeholder="أدخل مفتاح API هنا..." />
            <button id="save-api-btn">حفظ ومتابعة</button>
            <p id="api-error" style="color: #ff6b9d; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">جاري تحميل أليشيا...</p>
        <p id="loading-error"></p>
    </div>

    <div id="speech-bubble"></div>
    <div id="status-bar">جاهز</div>
    <div id="canvas-container"></div>

    <div id="controls-area">
        <input id="text-input" type="text" placeholder="اكتب رسالة..." autocomplete="off" />
        <button class="ctrl-btn" id="mic-btn" title="إدخال صوتي">&#127908;</button>
        <button class="ctrl-btn" id="send-btn" title="إرسال">&#10148;</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
    (async function() {
        const MODEL_PATH = './models/kei_vowels_pro/kei_vowels_pro.model3.json';
        const _ENC_KEY = 'QUl6YVN5QWh3VXY1cDRRMkMzX1lXbUFNOGVlSnJBZXpnYWpxVWFN';
        const _DEC = (s) => atob(s);
        let GEMINI_API_KEY = _DEC(_ENC_KEY);
        let AVAILABLE_MODEL = 'gemini-2.0-flash'; // Default
        
        // Memory and Skills
        let memory = { commands: [] };
        try {
            const memRes = await fetch('./memory.json');
            if (memRes.ok) memory = await memRes.json();
        } catch(e) { console.log("No memory file found"); }

        const SYSTEM_PROMPT = `أنتِ أليشيا (Alicia)، مساعدة ذكية وودودة بهيئة شخصية أنمي.
معلومات هامة عن المستخدم: ${memory.commands.join(' | ')}
المهارات المتاحة: كتابة المقالات، البحث في المستندات، تحليل السوق.
ردي دائماً باللغة العربية فقط. لا تستخدمي الصينية أو الإنجليزية أبداً.
يجب أن تكون إجاباتك قصيرة ومرحة ولا تتجاوز جملتين.`;

        const apiModal = document.getElementById('api-modal');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveApiBtn = document.getElementById('save-api-btn');
        const apiError = document.getElementById('api-error');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingError = document.getElementById('loading-error');
        const speechBubble = document.getElementById('speech-bubble');
        const statusText = document.getElementById('status-bar');
        const textInput = document.getElementById('text-input');
        const micBtn = document.getElementById('mic-btn');
        const sendBtn = document.getElementById('send-btn');
        const canvasContainer = document.getElementById('canvas-container');

        if (!GEMINI_API_KEY) {
            apiModal.classList.remove('hidden');
        }

        saveApiBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                apiError.textContent = 'يرجى إدخال مفتاح API';
                apiError.style.display = 'block';
                return;
            }
            
            saveApiBtn.disabled = true;
            saveApiBtn.textContent = 'جاري الاختبار...';
            
            try {
                // Test with gemini-2.0-flash which is more likely to be available
                const testUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
                const response = await fetch(testUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: 'test' }] }]
                    })
                });
                
                if (response.ok) {
                    localStorage.setItem('GEMINI_API_KEY', key);
                    GEMINI_API_KEY = key;
                    apiModal.classList.add('hidden');
                    location.reload();
                } else {
                    apiError.textContent = 'مفتاح API غير صحيح أو لا يدعم النماذج المطلوبة.';
                    apiError.style.display = 'block';
                }
            } catch (e) {
                apiError.textContent = 'خطأ في الاتصال. تحقق من الإنترنت.';
                apiError.style.display = 'block';
            }
            
            saveApiBtn.disabled = false;
            saveApiBtn.textContent = 'حفظ ومتابعة';
        });

        apiKeyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') saveApiBtn.click();
        });

        function showError(msg) {
            loadingText.textContent = 'خطأ';
            loadingError.textContent = msg;
            loadingError.style.display = 'block';
        }

        if (typeof PIXI === 'undefined' || typeof Live2DCubismCore === 'undefined') {
            showError('فشل تحميل المكتبات الأساسية. يرجى التحقق من الاتصال.');
            return;
        }

        const Live2DModel = PIXI.live2d.Live2DModel;
        let app, model;
        let isSpeaking = false;
        let lipSyncInterval = null;


        async function discoverModel() {
            updateStatus('جاري البحث عن أفضل موديل...');
            const models = ['gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-1.5-pro'];
            for (const m of models) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}?key=${GEMINI_API_KEY}`);
                    if (res.ok) {
                        AVAILABLE_MODEL = m;
                        console.log('Using model:', m);
                        return;
                    }
                } catch (e) {}
            }
        }
        await discoverModel();
        async function initLive2D() {
            try {
                app = new PIXI.Application({
                    width: window.innerWidth,
                    height: window.innerHeight,
                    backgroundAlpha: 0,
                    antialias: true,
                    resolution: window.devicePixelRatio || 1,
                    autoDensity: true,
                });

                canvasContainer.appendChild(app.view);

                model = await Live2DModel.from(MODEL_PATH, {
                    autoInteract: false,
                    autoUpdate: true,
                });

                const scaleRatio = Math.min(
                    window.innerWidth / model.width * 0.75,
                    window.innerHeight / model.height * 0.85
                );
                model.scale.set(scaleRatio);
                model.anchor.set(0.5, 0.5);
                model.x = app.screen.width / 2;
                model.y = app.screen.height / 2 + 40;

                app.stage.addChild(model);

                window.addEventListener('resize', () => {
                    app.renderer.resize(window.innerWidth, window.innerHeight);
                    const newScale = Math.min(
                        window.innerWidth / (model.internalModel.originalWidth || model.width) * 0.75,
                        window.innerHeight / (model.internalModel.originalHeight || model.height) * 0.85
                    );
                    model.scale.set(newScale);
                    model.x = app.screen.width / 2;
                    model.y = app.screen.height / 2 + 40;
                });

                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                    updateStatus('جاهز - اضغط على الميكروفون أو اكتب رسالة');
                }, 1000);

            } catch (error) {
                showError('فشل تحميل النموذج: ' + error.message);
            }
        }

        function startLipSync() {
            isSpeaking = true;
            lipSyncInterval = setInterval(() => {
                if (!isSpeaking || !model) return;
                const mouthOpen = 0.2 + Math.random() * 0.6;
                try {
                    model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen);
                } catch (e) {}
            }, 100);
        }

        function stopLipSync() {
            isSpeaking = false;
            if (lipSyncInterval) clearInterval(lipSyncInterval);
            try {
                model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
            } catch (e) {}
        }

        async function getAIResponse(userText) {
            if (!GEMINI_API_KEY) {
                apiModal.classList.remove('hidden');
                return "يرجى إدخال مفتاح API أولاً.";
            }
            updateStatus('جاري التفكير...');
            try {
                // Use gemini-2.0-flash as it's the latest stable and likely available
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${AVAILABLE_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: SYSTEM_PROMPT + "\n\nUser: " + userText
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('API Error:', errorData);
                    if (response.status === 400 || response.status === 403 || response.status === 404) {
                        localStorage.removeItem('GEMINI_API_KEY');
                        apiModal.classList.remove('hidden');
                        return "مفتاح API غير صحيح أو لا يدعم النموذج المطلوب. يرجى إدخال مفتاح جديد.";
                    }
                    return "عذراً، حدث خطأ في الخادم. حاول لاحقاً.";
                }

                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                }
                return "عذراً، تعذرت معالجة الطلب. حاول مرة أخرى.";
            } catch (e) {
                console.error('AI Error:', e);
                return "عذراً، واجهت مشكلة في الاتصال.";
            }
        }

        function speakText(text) {
            return new Promise((resolve) => {
                updateStatus('تتحدث...');
                startLipSync();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP'; // اليابانية
                utterance.rate = 1.0;
                utterance.pitch = 1.2;
                
                utterance.onend = () => {
                    stopLipSync();
                    updateStatus('جاهز');
                    resolve();
                };
                
                utterance.onerror = (event) => {
                    console.error('Speech error:', event.error);
                    stopLipSync();
                    updateStatus('جاهز');
                    resolve();
                };
                
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            });
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                updateStatus('جاري الاستماع...');
                micBtn.classList.add('recording');
                micBtn.disabled = true;
                sendBtn.disabled = true;
            };
            
            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                await processUserInput(text);
            };
            
            recognition.onerror = (event) => {
                micBtn.classList.remove('recording');
                micBtn.disabled = false;
                sendBtn.disabled = false;
                updateStatus('خطأ: ' + event.error);
            };
            
            recognition.onend = () => {
                micBtn.classList.remove('recording');
                micBtn.disabled = false;
                sendBtn.disabled = false;
            };
        }

        async function processUserInput(text) {
            if (!text.trim()) return;
            sendBtn.disabled = true;
            micBtn.disabled = true;
            try {
                const aiResponse = await getAIResponse(text);
                showBubble(aiResponse);
                await speakText(aiResponse);
            } catch (e) {
                console.error('Process error:', e);
                showBubble('حدث خطأ في المعالجة');
            }
            sendBtn.disabled = false;
            micBtn.disabled = false;
        }

        function showBubble(text) {
            speechBubble.textContent = text;
            speechBubble.classList.add('visible');
            setTimeout(() => speechBubble.classList.remove('visible'), 8000);
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        sendBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                textInput.value = '';
                processUserInput(text);
            }
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) {
                    textInput.value = '';
                    processUserInput(text);
                }
            }
        });

        micBtn.addEventListener('click', () => {
            if (recognition) {
                recognition.start();
            } else {
                alert('متصفحك لا يدعم التعرف على الصوت.');
            }
        });

        await initLive2D();
    })();
    </script>
</body>
</html>
