<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alicia AI - Live2D Avatar</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(15, 12, 41, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 16px;
            color: #ddd;
            text-align: center;
            max-width: 300px;
        }

        #loading-error {
            font-size: 14px;
            color: #ff6b9d;
            margin-top: 10px;
            display: none;
        }

        #speech-bubble {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 24px;
            border-radius: 20px;
            max-width: 80%;
            min-width: 200px;
            text-align: center;
            font-size: 16px;
            line-height: 1.6;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        #speech-bubble.visible { opacity: 1; }

        #controls-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        #text-input {
            width: 280px;
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #text-input:focus { border-color: #ff6b9d; }
        #text-input::placeholder { color: rgba(255,255,255,0.5); }

        .ctrl-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: scale(1.05);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .ctrl-btn.recording {
            background: rgba(255, 0, 0, 0.7);
            border-color: #ff4444;
            animation: pulse-record 1s ease-in-out infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); }
        }

        #status-bar {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 5px 14px;
            border-radius: 12px;
        }

        #title-badge {
            position: fixed;
            top: 15px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            #text-input { width: 200px; font-size: 14px; padding: 12px 16px; }
            .ctrl-btn { width: 45px; height: 45px; font-size: 18px; }
            #speech-bubble { font-size: 14px; max-width: 90%; padding: 10px 18px; }
        }
    </style>
</head>
<body>

    <div id="title-badge">Alicia AI - Live2D</div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading Alicia Live2D Model...</p>
        <p id="loading-error"></p>
    </div>

    <div id="speech-bubble"></div>
    <div id="status-bar">Ready</div>
    <div id="canvas-container"></div>

    <div id="controls-area">
        <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off" />
        <button class="ctrl-btn" id="mic-btn" title="Voice Input">&#127908;</button>
        <button class="ctrl-btn" id="send-btn" title="Send">&#10148;</button>
    </div>

    <!-- Step 1: Load PIXI.js v6 (compatible with pixi-live2d-display) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>

    <!-- Step 2: Load Live2D Cubism Core SDK -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

    <!-- Step 3: Load pixi-live2d-display for Cubism 4 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
    (async function() {

        // ==================== CONFIGURATION ====================
        const MODEL_PATH = './models/kei_vowels_pro/kei_vowels_pro.model3.json';
        const GEMINI_API_KEY = "AIzaSyBam_QaB2ogtvxiqCEkKMGwdqHSkNdqUdE";
        const SYSTEM_PROMPT = "أنتِ أليشيا (Alicia)، مساعدة ذكية وودودة بهيئة شخصية أنمي. ردي دائماً باختصار وبأسلوب مرح باللغة العربية. يجب ألا تتجاوز إجابتك جملتين.";

        // ==================== DOM ELEMENTS ====================
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingError = document.getElementById('loading-error');
        const speechBubble = document.getElementById('speech-bubble');
        const statusText = document.getElementById('status-bar');
        const textInput = document.getElementById('text-input');
        const micBtn = document.getElementById('mic-btn');
        const sendBtn = document.getElementById('send-btn');
        const canvasContainer = document.getElementById('canvas-container');

        // ==================== VERIFY LIBRARIES ====================
        function showError(msg) {
            loadingText.textContent = 'Error';
            loadingError.textContent = msg;
            loadingError.style.display = 'block';
        }

        if (typeof PIXI === 'undefined') {
            showError('PIXI.js failed to load. Check your internet connection.');
            return;
        }

        if (typeof Live2DCubismCore === 'undefined') {
            showError('Live2D Cubism Core failed to load. Trying fallback...');
            // Try fallback CDN for Cubism Core
            try {
                await new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = 'https://cdn.jsdelivr.net/gh/nicx-next/nicx-next.github.io@master/live2d_cubism/js/live2dcubismcore.min.js';
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
                loadingError.style.display = 'none';
            } catch(e) {
                showError('Live2D Core SDK is unavailable. The model cannot be loaded.');
                return;
            }
        }

        if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
            showError('pixi-live2d-display library failed to load.');
            return;
        }

        // ==================== LIVE2D SETUP ====================
        const Live2DModel = PIXI.live2d.Live2DModel;
        let app, model;
        let isSpeaking = false;
        let lipSyncInterval = null;

        async function initLive2D() {
            try {
                loadingText.textContent = 'Initializing engine...';

                // Create PIXI Application (v6 API)
                app = new PIXI.Application({
                    width: window.innerWidth,
                    height: window.innerHeight,
                    backgroundAlpha: 0,
                    antialias: true,
                    resolution: window.devicePixelRatio || 1,
                    autoDensity: true,
                });

                const canvas = app.view;
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.display = 'block';
                canvasContainer.appendChild(canvas);

                loadingText.textContent = 'Loading Alicia model...';

                // Load the Live2D model
                model = await Live2DModel.from(MODEL_PATH, {
                    autoInteract: false,
                    autoUpdate: true,
                });

                // Scale model to fit screen
                const scaleRatio = Math.min(
                    window.innerWidth / model.width * 0.75,
                    window.innerHeight / model.height * 0.85
                );
                model.scale.set(scaleRatio);
                model.anchor.set(0.5, 0.5);
                model.x = app.screen.width / 2;
                model.y = app.screen.height / 2 + 40;

                app.stage.addChild(model);

                // Enable mouse/touch tracking for model
                app.stage.eventMode = 'static';
                app.stage.hitArea = app.screen;

                model.interactive = true;
                model.buttonMode = true;
                model.on('pointerdown', (hitAreas) => {
                    playRandomMotion();
                    showBubble('أهلاً! أنا أليشيا');
                });

                // Handle resize
                window.addEventListener('resize', () => {
                    app.renderer.resize(window.innerWidth, window.innerHeight);
                    const newScale = Math.min(
                        window.innerWidth / (model.internalModel.originalWidth || model.width) * 0.75,
                        window.innerHeight / (model.internalModel.originalHeight || model.height) * 0.85
                    );
                    model.scale.set(newScale);
                    model.x = app.screen.width / 2;
                    model.y = app.screen.height / 2 + 40;
                });

                // Track mouse for model to follow
                document.addEventListener('mousemove', (e) => {
                    if (model && model.internalModel) {
                        const rect = canvas.getBoundingClientRect();
                        const x = (e.clientX - rect.left) / rect.width;
                        const y = (e.clientY - rect.top) / rect.height;
                        model.focus(x * model.internalModel.originalWidth, y * model.internalModel.originalHeight);
                    }
                });

                document.addEventListener('touchmove', (e) => {
                    if (model && model.internalModel && e.touches.length > 0) {
                        const touch = e.touches[0];
                        const rect = canvas.getBoundingClientRect();
                        const x = (touch.clientX - rect.left) / rect.width;
                        const y = (touch.clientY - rect.top) / rect.height;
                        model.focus(x * model.internalModel.originalWidth, y * model.internalModel.originalHeight);
                    }
                });

                // Hide loading screen
                setTimeout(() => {
                    hideLoading();
                    playRandomMotion();
                }, 1000);

                // Periodic idle animation
                setInterval(() => {
                    if (!isSpeaking && model) {
                        if (Math.random() > 0.5) {
                            playRandomMotion();
                        }
                    }
                }, 10000);

                console.log('Live2D model loaded successfully!');

            } catch (error) {
                console.error('Live2D Error:', error);
                showError('Failed to load model: ' + error.message);
            }
        }

        function playRandomMotion() {
            if (!model) return;
            try {
                const motionManager = model.internalModel.motionManager;
                if (motionManager) {
                    model.motion('');
                }
            } catch(e) {
                // Motions may not be available
            }
        }

        // ==================== LIP SYNC ====================
        function startLipSync() {
            isSpeaking = true;
            let t = 0;

            lipSyncInterval = setInterval(() => {
                if (!isSpeaking || !model) return;
                t += 0.12;

                const coreModel = model.internalModel.coreModel;
                const mouthOpen = 0.2 + Math.random() * 0.6;

                try {
                    // Vowel-based lip sync for natural mouth movement
                    const vowelPhase = (t * 1.8) % 5;
                    const vowelIndex = Math.floor(vowelPhase);
                    const blendFactor = vowelPhase - vowelIndex;
                    const nextIndex = (vowelIndex + 1) % 5;

                    const vowelParams = ['ParamA', 'ParamI', 'ParamU', 'ParamE', 'ParamO'];

                    // Reset all vowel parameters
                    for (const vp of vowelParams) {
                        coreModel.setParameterValueById(vp, 0);
                    }

                    // Blend between two vowels for smooth transition
                    const activeVal = (1.0 - blendFactor) * mouthOpen;
                    const nextVal = blendFactor * mouthOpen * 0.6;

                    coreModel.setParameterValueById(vowelParams[vowelIndex], activeVal);
                    coreModel.setParameterValueById(vowelParams[nextIndex], nextVal);
                    coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen);

                } catch (e) {
                    // Fallback: basic mouth open/close
                    try {
                        coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen);
                    } catch(e2) {}
                }
            }, 75);
        }

        function stopLipSync() {
            isSpeaking = false;
            if (lipSyncInterval) {
                clearInterval(lipSyncInterval);
                lipSyncInterval = null;
            }

            // Smoothly close mouth
            if (model) {
                let step = 0;
                const closeInterval = setInterval(() => {
                    step += 0.15;
                    const closeVal = Math.max(0, 1 - step);
                    try {
                        const cm = model.internalModel.coreModel;
                        cm.setParameterValueById('ParamMouthOpenY', closeVal);
                        cm.setParameterValueById('ParamA', 0);
                        cm.setParameterValueById('ParamI', 0);
                        cm.setParameterValueById('ParamU', 0);
                        cm.setParameterValueById('ParamE', 0);
                        cm.setParameterValueById('ParamO', 0);
                    } catch(e) {}
                    if (step >= 1) clearInterval(closeInterval);
                }, 25);
            }
        }

        // ==================== AI CHAT ====================
        async function getAIResponse(userText) {
            updateStatus('Thinking...');
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nUser: " + userText }] }]
                    })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0]) {
                    return data.candidates[0].content.parts[0].text;
                }
                return "عذراً، لم أتمكن من معالجة طلبك.";
            } catch (e) {
                console.error('AI Error:', e);
                return "عذراً، واجهت مشكلة في الاتصال.";
            }
        }

        // ==================== TEXT-TO-SPEECH ====================
        function speakText(text) {
            return new Promise((resolve) => {
                updateStatus('Speaking...');
                startLipSync();
                playRandomMotion();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ar-SA';
                utterance.rate = 0.95;
                utterance.pitch = 1.1;

                utterance.onend = () => {
                    stopLipSync();
                    updateStatus('Ready');
                    resolve();
                };

                utterance.onerror = () => {
                    stopLipSync();
                    updateStatus('Ready');
                    resolve();
                };

                window.speechSynthesis.speak(utterance);
            });
        }

        // ==================== SPEECH RECOGNITION ====================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onstart = () => {
                updateStatus('Listening...');
                micBtn.classList.add('recording');
                micBtn.disabled = true;
                sendBtn.disabled = true;
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                updateStatus('Heard: ' + text);
                textInput.value = text;
                await processUserInput(text);
            };

            recognition.onerror = (event) => {
                micBtn.classList.remove('recording');
                micBtn.disabled = false;
                sendBtn.disabled = false;
                updateStatus('Error: ' + event.error);
            };

            recognition.onend = () => {
                micBtn.classList.remove('recording');
                micBtn.disabled = false;
                sendBtn.disabled = false;
            };
        }

        // ==================== MAIN CONVERSATION FLOW ====================
        async function processUserInput(text) {
            if (!text.trim()) return;
            sendBtn.disabled = true;
            micBtn.disabled = true;

            try {
                const aiResponse = await getAIResponse(text);
                showBubble(aiResponse);
                await speakText(aiResponse);
            } catch (e) {
                console.error('Process error:', e);
                updateStatus('Error occurred');
            }

            sendBtn.disabled = false;
            micBtn.disabled = false;
        }

        // ==================== UI HELPERS ====================
        function showBubble(text) {
            speechBubble.textContent = text;
            speechBubble.classList.add('visible');
            setTimeout(() => speechBubble.classList.remove('visible'), 8000);
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
            updateStatus('Ready - Click mic or type a message');
        }

        // ==================== EVENT LISTENERS ====================
        sendBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                textInput.value = '';
                processUserInput(text);
            }
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) {
                    textInput.value = '';
                    processUserInput(text);
                }
            }
        });

        micBtn.addEventListener('click', () => {
            if (recognition) {
                recognition.start();
            } else {
                showBubble('Speech recognition is not supported in this browser. Please type a message.');
            }
        });

        // ==================== INITIALIZE ====================
        await initLive2D();

    })();
    </script>

</body>
</html>
