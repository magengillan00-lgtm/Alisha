<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alicia AI - GitHub Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas { display: block; width: 100vw; height: 100vh; }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(20, 20, 30, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #api-key-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            backdrop-filter: blur(10px);
        }

        #api-key-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #api-key-input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        #api-key-submit {
            padding: 10px 30px;
            border-radius: 20px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #alicia-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            width: 90%;
            max-width: 500px;
        }

        #alicia-msg {
            flex-grow: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            outline: none;
        }

        #alicia-send {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        #alicia-bubble {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            max-width: 80%;
            text-align: center;
            display: none;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading Alicia...</p>
    </div>

    <div id="api-key-overlay">
        <div id="api-key-container">
            <h2>Welcome to Alicia AI</h2>
            <p>Please enter your OpenRouter API Key to continue:</p>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
            <button id="api-key-submit">Start Chat</button>
            <p style="font-size: 12px; margin-top: 15px; opacity: 0.7;">Your key is stored locally in your browser and never sent to our servers.</p>
        </div>
    </div>

    <div id="alicia-bubble"></div>

    <div id="alicia-controls">
        <input type="text" id="alicia-msg" placeholder="Type something to Alicia..." autocomplete="off">
        <button id="alicia-send">🎤</button>
    </div>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let OR_KEY = localStorage.getItem('alicia_or_key') || "";
        const SYSTEM_PROMPT = `أنتِ أليشيا (Alicia)، مساعدة ذكية وودودة بهيئة شخصية أنمي. 
        يجب أن تكون جميع ردودك باللغة اليابانية فقط، حتى لو سألك المستخدم بالعربية. 
        اجعلي الردود قصيرة ومرحة. 
        معلومات إضافية: اسم المستخدم هو غيلان بن عقبة، ويلقب بـ ميجن غيلان أو الملك الأحمر.`;

        let scene, camera, renderer, clock, mixer, currentVrm, controls;
        const animationsMap = new Map();
        let idleAction, currentAction;
        const talkingAnimationNames = ['./assets/animations/anim_1.fbx', './assets/animations/anim_2.fbx', './assets/animations/anim_3.fbx'];

        const msgInput = document.getElementById('alicia-msg');
        const sendBtn = document.getElementById('alicia-send');
        const bubble = document.getElementById('alicia-bubble');
        const apiKeyOverlay = document.getElementById('api-key-overlay');
        const apiKeyInput = document.getElementById('api-key-input');
        const apiKeySubmit = document.getElementById('api-key-submit');

        if (OR_KEY) {
            apiKeyOverlay.style.display = 'none';
        }

        apiKeySubmit.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                OR_KEY = key;
                localStorage.setItem('alicia_or_key', key);
                apiKeyOverlay.style.display = 'none';
            }
        });

        const mixamoVRMRigMap = {
            mixamorigHips: 'hips', mixamorigSpine: 'spine', mixamorigSpine1: 'chest',
            mixamorigSpine2: 'upperChest', mixamorigNeck: 'neck', mixamorigHead: 'head',
            mixamorigLeftShoulder: 'leftShoulder', mixamorigLeftArm: 'leftUpperArm',
            mixamorigLeftForeArm: 'leftLowerArm', mixamorigLeftHand: 'leftHand',
            mixamorigRightShoulder: 'rightShoulder', mixamorigRightArm: 'rightUpperArm',
            mixamorigRightForeArm: 'rightLowerArm', mixamorigRightHand: 'rightHand',
            mixamorigLeftUpLeg: 'leftUpperLeg', mixamorigLeftLeg: 'leftLowerLeg',
            mixamorigLeftFoot: 'leftFoot', mixamorigLeftToeBase: 'leftToes',
            mixamorigRightUpLeg: 'rightUpperLeg', mixamorigRightLeg: 'rightLowerLeg',
            mixamorigRightFoot: 'rightFoot', mixamorigRightToeBase: 'rightToes',
        };

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Position camera to focus on upper body and center the avatar
            camera.position.set(0, 1.4, 1.2);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            // Target the chest/head area to keep it centered
            controls.target.set(0, 1.3, 0);
            controls.enableDamping = true;
            // Disable panning to keep avatar centered
            controls.enablePan = false;
            // Limit zoom if desired, or keep it as requested (only zoom allowed)
            controls.minDistance = 0.5;
            controls.maxDistance = 5;
            controls.update();

            new RGBELoader().load('./assets/backgrounds/background.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
            }, undefined, (err) => console.warn("Background HDR not found, using default lighting."));

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(1, 2, 3);
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize);
            
            loadVRM('./assets/models/waifu.vrm');
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function loadVRM(url) {
            const loader = new GLTFLoader();
            loader.register(parser => new VRMLoaderPlugin(parser));
            try {
                const gltf = await loader.loadAsync(url);
                currentVrm = gltf.userData.vrm;
                scene.add(currentVrm.scene);
                VRMUtils.rotateVRM0(currentVrm);
                mixer = new THREE.AnimationMixer(currentVrm.scene);
                
                await preloadAnimations();
                document.getElementById('loading-overlay').classList.add('hidden');
            } catch (error) {
                console.error('VRM Load Error:', error);
                document.getElementById('loading-text').innerText = "Error loading Alicia.";
            }
        }

        async function loadMixamoAnimation(url, vrm) {
            const loader = new FBXLoader();
            const asset = await loader.loadAsync(url);
            const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com');
            const tracks = [];
            const restRotationInverse = new THREE.Quaternion();
            const parentRestWorldRotation = new THREE.Quaternion();
            const _quatA = new THREE.Quaternion();
            const motionHipsHeight = asset.getObjectByName('mixamorigHips').position.y;
            const vrmHipsHeight = vrm.humanoid.getNormalizedBoneNode('hips').position.y;
            const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

            clip.tracks.forEach((track) => {
                const trackSplitted = track.name.split('.');
                const mixamoRigName = trackSplitted[0];
                const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
                const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
                if (vrmNodeName != null) {
                    const propertyName = trackSplitted[1];
                    const mixamoRigNode = asset.getObjectByName(mixamoRigName);
                    mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
                    mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);
                    if (track instanceof THREE.QuaternionKeyframeTrack) {
                        for (let i = 0; i < track.values.length; i += 4) {
                            const flatQuaternion = track.values.slice(i, i + 4);
                            _quatA.fromArray(flatQuaternion).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flatQuaternion);
                            flatQuaternion.forEach((v, index) => { track.values[index + i] = v; });
                        }
                        tracks.push(new THREE.QuaternionKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, track.values));
                    } else if (track instanceof THREE.VectorKeyframeTrack) {
                        const value = track.values.map((v, i) => v * hipsPositionScale);
                        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, value));
                    }
                }
            });
            return new THREE.AnimationClip(clip.name, clip.duration, tracks);
        }

        async function preloadAnimations() {
            const anims = ['./assets/animations/idle.fbx', ...talkingAnimationNames];
            for (const path of anims) {
                try {
                    const name = path.split('/').pop().replace('.fbx', '');
                    const clip = await loadMixamoAnimation(path, currentVrm);
                    clip.name = name;
                    animationsMap.set(name, clip);
                    if (name === 'idle') {
                        idleAction = mixer.clipAction(clip);
                        idleAction.play();
                        currentAction = idleAction;
                    }
                } catch (e) { console.warn("Failed to load animation:", path); }
            }
        }

        function playRandomTalkingAnimation() {
            const names = talkingAnimationNames.map(n => n.split('/').pop().replace('.fbx', ''));
            const nextName = names[Math.floor(Math.random() * names.length)];
            const nextClip = animationsMap.get(nextName);
            if (nextClip && currentAction) {
                const nextAction = mixer.clipAction(nextClip);
                nextAction.reset().setLoop(THREE.LoopOnce, 1).play();
                currentAction.crossFadeTo(nextAction, 0.5);
                currentAction = nextAction;
                mixer.addEventListener('finished', () => {
                    nextAction.crossFadeTo(idleAction.reset().play(), 0.5);
                    currentAction = idleAction;
                }, { once: true });
            }
        }

        async function askAlicia(text) {
            if (!OR_KEY) {
                apiKeyOverlay.style.display = 'flex';
                return;
            }
            showBubble("Thinking...");
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${OR_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-001",
                        messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                showBubble(reply);
                speakJapanese(reply);
            } catch (e) { showBubble("Error connecting to Alicia."); }
        }

        function showBubble(text) {
            bubble.innerText = text;
            bubble.style.display = 'block';
            setTimeout(() => { bubble.style.display = 'none'; }, 7000);
        }

        function speakJapanese(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.onstart = () => { startLipSync(); playRandomTalkingAnimation(); };
            ut.onend = () => { stopLipSync(); };
            window.speechSynthesis.speak(ut);
        }

        let lipSyncInterval;
        function startLipSync() {
            lipSyncInterval = setInterval(() => {
                if (currentVrm) currentVrm.expressionManager.setValue('aa', 0.5 + Math.random() * 0.5);
            }, 100);
        }

        function stopLipSync() {
            clearInterval(lipSyncInterval);
            if (currentVrm) currentVrm.expressionManager.setValue('aa', 0);
        }

        sendBtn.addEventListener('click', () => {
            const val = msgInput.value.trim();
            if (val) { askAlicia(val); msgInput.value = ''; }
        });

        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (currentVrm) currentVrm.update(delta);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
