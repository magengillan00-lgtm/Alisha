<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alisha AI - Hugging Face Edition</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(15, 12, 41, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 16px;
            color: #ddd;
            text-align: center;
            max-width: 300px;
        }

        #loading-error {
            font-size: 14px;
            color: #ff6b9d;
            margin-top: 10px;
            display: none;
        }

        #speech-bubble {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 24px;
            border-radius: 20px;
            max-width: 80%;
            min-width: 200px;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        #speech-bubble.visible { opacity: 1; }

        #controls-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        #text-input {
            width: 280px;
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            text-align: right;
        }

        #text-input:focus { border-color: #ff6b9d; }
        #text-input::placeholder { color: rgba(255,255,255,0.5); }

        .ctrl-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: scale(1.05);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .ctrl-btn.recording {
            background: rgba(255, 0, 0, 0.7);
            border-color: #ff4444;
            animation: pulse-record 1s ease-in-out infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); }
        }

        #status-bar {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 5px 14px;
            border-radius: 12px;
        }

        #api-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.2);
            direction: rtl;
        }

        .modal-content h2 { color: white; margin-bottom: 20px; }
        .modal-content p { color: #ccc; margin-bottom: 15px; font-size: 14px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #0f0c29;
            color: white;
            font-size: 14px;
            text-align: center;
        }
        .modal-content button {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }
        .modal-content button:hover { background: #ff5080; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #text-input { width: 200px; font-size: 14px; padding: 12px 16px; }
            .ctrl-btn { width: 45px; height: 45px; font-size: 18px; }
            #speech-bubble { font-size: 14px; max-width: 90%; padding: 10px 18px; }
        }
    </style>
</head>
<body>

    <div id="api-modal">
        <div class="modal-content">
            <h2>إعدادات Alisha</h2>
            <p>ادخل مفتاح Hugging Face الخاص بك (يبدأ بـ hf_):</p>
            <input type="password" id="hf-api-key" placeholder="hf_..." />
            
            <p>اختر نموذج الذكاء الاصطناعي:</p>
            <select id="ai-model-select">
                <option value="Qwen/Qwen2.5-7B-Instruct">Qwen 2.5 7B (موصى به - سريع ومفتوح)</option>
                <option value="mistralai/Mistral-7B-Instruct-v0.3">Mistral 7B Instruct (يتطلب موافقة)</option>
                <option value="meta-llama/Llama-3.2-3B-Instruct">Llama 3.2 3B (يتطلب موافقة)</option>
                <option value="HuggingFaceH4/zephyr-7b-beta">Zephyr 7B Beta</option>
                <option value="microsoft/Phi-3-mini-4k-instruct">Microsoft Phi-3 Mini</option>
            </select>
            
            <button id="save-settings-btn">حفظ وتفعيل</button>
            <p id="api-error" style="color: #ff6b9d; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p id="loading-text">جاري تحميل اليشيا...</p>
        <p id="loading-error"></p>
    </div>

    <div id="speech-bubble"></div>
    <div id="status-bar">جاهز</div>
    <div id="canvas-container"></div>

    <div id="controls-area">
        <input id="text-input" type="text" placeholder="اكتب رسالة..." autocomplete="off" />
        <button class="ctrl-btn" id="mic-btn" title="إدخال صوتي">&#127908;</button>
        <button class="ctrl-btn" id="send-btn" title="إرسال">&#10148;</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
    (async function() {
        const MODEL_PATH = './models/kei_vowels_pro/kei_vowels_pro.model3.json';
        let HF_API_KEY = localStorage.getItem('HF_API_KEY') || '';
        let SELECTED_MODEL = localStorage.getItem('SELECTED_MODEL') || 'Qwen/Qwen2.5-7B-Instruct';
        
        const SYSTEM_PROMPT = "أنتِ 'اليشيا' (Alisha)، مساعدة ذكية ولطيفة بهيئة فتاة أنمي. ردي دائماً باللغة العربية بأسلوب مهذب وقصير (جملتين كحد أقصى). لا تذكري أنكِ نموذج ذكاء اصطناعي.";

        const apiModal = document.getElementById('api-modal');
        const hfKeyInput = document.getElementById('hf-api-key');
        const modelSelect = document.getElementById('ai-model-select');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const apiError = document.getElementById('api-error');
        
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingError = document.getElementById('loading-error');
        const speechBubble = document.getElementById('speech-bubble');
        const statusText = document.getElementById('status-bar');
        const textInput = document.getElementById('text-input');
        const micBtn = document.getElementById('mic-btn');
        const sendBtn = document.getElementById('send-btn');
        const canvasContainer = document.getElementById('canvas-container');

        let app, model;
        let isSpeaking = false;
        let lipSyncInterval = null;

        function checkLibraries() {
            return typeof PIXI !== 'undefined' && typeof Live2DCubismCore !== 'undefined';
        }

        async function initLive2D() {
            if (!checkLibraries()) {
                showError('فشل تحميل المكتبات الأساسية. يرجى تحديث الصفحة.');
                return;
            }

            loadingOverlay.classList.remove('hidden');
            loadingText.textContent = 'جاري تحميل اليشيا...';
            loadingError.style.display = 'none';

            try {
                const Live2DModel = PIXI.live2d.Live2DModel;

                app = new PIXI.Application({
                    width: window.innerWidth,
                    height: window.innerHeight,
                    backgroundAlpha: 0,
                    antialias: true,
                    resolution: window.devicePixelRatio || 1,
                    autoDensity: true,
                });

                canvasContainer.innerHTML = '';
                canvasContainer.appendChild(app.view);

                const modelPromise = Live2DModel.from(MODEL_PATH, {
                    autoInteract: false,
                    autoUpdate: true,
                });

                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('انتهت مهلة تحميل النموذج')), 15000)
                );

                model = await Promise.race([modelPromise, timeoutPromise]);

                const scaleRatio = Math.min(
                    window.innerWidth / model.width * 0.75,
                    window.innerHeight / model.height * 0.85
                );
                model.scale.set(scaleRatio);
                model.anchor.set(0.5, 0.5);
                model.x = app.screen.width / 2;
                model.y = app.screen.height / 2 + 40;

                app.stage.addChild(model);

                window.addEventListener('resize', () => {
                    if (!app) return;
                    app.renderer.resize(window.innerWidth, window.innerHeight);
                    const newScale = Math.min(
                        window.innerWidth / (model.internalModel.originalWidth || model.width) * 0.75,
                        window.innerHeight / (model.internalModel.originalHeight || model.height) * 0.85
                    );
                    model.scale.set(newScale);
                    model.x = app.screen.width / 2;
                    model.y = app.screen.height / 2 + 40;
                });

                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                    updateStatus('جاهز');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                showError('خطأ في التحميل: ' + error.message);
            }
        }

        function showError(msg) {
            loadingOverlay.classList.remove('hidden');
            loadingText.textContent = 'خطأ';
            loadingError.textContent = msg;
            loadingError.style.display = 'block';
        }

        function startLipSync() {
            isSpeaking = true;
            lipSyncInterval = setInterval(() => {
                if (!isSpeaking || !model) return;
                const mouthOpen = 0.2 + Math.random() * 0.6;
                try {
                    model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen);
                } catch (e) {}
            }, 100);
        }

        function stopLipSync() {
            isSpeaking = false;
            if (lipSyncInterval) clearInterval(lipSyncInterval);
            try {
                if (model) model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
            } catch (e) {}
        }

        async function getAIResponse(userText) {
            if (!HF_API_KEY) {
                apiModal.classList.remove('hidden');
                return "يرجى إدخال مفتاح API أولاً.";
            }
            updateStatus('جاري التفكير...');
            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${SELECTED_MODEL}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HF_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: `<|system|>\n${SYSTEM_PROMPT}\n<|user|>\n${userText}\n<|assistant|>\n`,
                        parameters: { max_new_tokens: 150, return_full_text: false }
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    console.error('HF Error:', err);
                    if (response.status === 401) return "خطأ: مفتاح API غير صالح. يرجى التأكد من المفتاح.";
                    if (response.status === 403) return "خطأ: هذا النموذج يتطلب موافقة من موقع Hugging Face. جرب نموذج Qwen.";
                    if (response.status === 503) return "النموذج قيد التحميل حالياً، يرجى المحاولة بعد ثوانٍ...";
                    return "حدث خطأ في الاتصال بـ Hugging Face. (كود: " + response.status + ")";
                }

                const data = await response.json();
                let result = "";
                if (Array.isArray(data)) result = data[0]?.generated_text || "";
                else result = data.generated_text || "";
                
                // Clean up response if it contains prompt tags
                result = result.replace(/<\|.*?\|>/g, '').trim();
                
                return result || "لم أستطع فهم ذلك.";
            } catch (e) {
                console.error('AI Error:', e);
                return "خطأ في الاتصال بالإنترنت.";
            }
        }

        function speakText(text) {
            return new Promise((resolve) => {
                updateStatus('جاري التحدث...');
                startLipSync();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ar-SA';
                utterance.rate = 1.0;
                utterance.pitch = 1.1;
                
                utterance.onend = () => {
                    stopLipSync();
                    updateStatus('جاهز');
                    resolve();
                };
                
                utterance.onerror = (event) => {
                    console.error('Speech error:', event.error);
                    stopLipSync();
                    updateStatus('جاهز');
                    resolve();
                };
                
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            });
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                updateStatus('جاري الاستماع...');
                micBtn.classList.add('recording');
                micBtn.disabled = true;
                sendBtn.disabled = true;
            };
            
            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                await processUserInput(text);
            };
            
            recognition.onerror = (event) => {
                micBtn.classList.remove('recording');
                micBtn.disabled = false;
                sendBtn.disabled = false;
                updateStatus('خطأ: ' + event.error);
            };
            
            recognition.onend = () => {
                micBtn.classList.remove('recording');
                micBtn.disabled = false;
                sendBtn.disabled = false;
            };
        }

        async function processUserInput(text) {
            if (!text.trim()) return;
            sendBtn.disabled = true;
            micBtn.disabled = true;
            try {
                const aiResponse = await getAIResponse(text);
                showBubble(aiResponse);
                await speakText(aiResponse);
            } catch (e) {
                console.error('Process error:', e);
                showBubble('حدث خطأ أثناء معالجة الطلب.');
            }
            sendBtn.disabled = false;
            micBtn.disabled = false;
        }

        function showBubble(text) {
            speechBubble.textContent = text;
            speechBubble.classList.add('visible');
            setTimeout(() => speechBubble.classList.remove('visible'), 8000);
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        sendBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                textInput.value = '';
                processUserInput(text);
            }
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) {
                    textInput.value = '';
                    processUserInput(text);
                }
            }
        });

        micBtn.addEventListener('click', () => {
            if (recognition) {
                recognition.start();
            } else {
                alert('متصفحك لا يدعم التعرف على الكلام.');
            }
        });

        saveSettingsBtn.addEventListener('click', () => {
            const key = hfKeyInput.value.trim();
            const model = modelSelect.value;
            
            if (!key) {
                apiError.textContent = 'يرجى إدخال مفتاح API';
                apiError.style.display = 'block';
                return;
            }
            
            if (!key.startsWith('hf_')) {
                apiError.textContent = 'المفتاح يجب أن يبدأ بـ hf_';
                apiError.style.display = 'block';
                return;
            }
            
            localStorage.setItem('HF_API_KEY', key);
            localStorage.setItem('SELECTED_MODEL', model);
            HF_API_KEY = key;
            SELECTED_MODEL = model;
            
            apiModal.classList.add('hidden');
            if (!app) {
                initLive2D();
            } else {
                updateStatus('تم تحديث الإعدادات');
            }
        });

        if (HF_API_KEY) {
            hfKeyInput.value = HF_API_KEY;
            apiModal.classList.add('hidden');
            initLive2D();
        }
        modelSelect.value = SELECTED_MODEL;

    })();
    </script>
</body>
</html>
