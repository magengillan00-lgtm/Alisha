<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alicia AI - GitHub Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas { display: block; width: 100vw; height: 100vh; }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(20, 20, 30, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #api-key-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            backdrop-filter: blur(10px);
        }

        #api-key-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #api-key-input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        #api-key-submit {
            padding: 10px 30px;
            border-radius: 20px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #alicia-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            width: 90%;
            max-width: 500px;
        }

        #alicia-msg {
            flex-grow: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            outline: none;
        }

        #alicia-send {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        #alicia-send.recording {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #alicia-bubble {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            max-width: 80%;
            text-align: center;
            display: none;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #status-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #3498db;
            font-size: 12px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading Alicia...</p>
    </div>

    <div id="api-key-overlay">
        <div id="api-key-container">
            <h2>Welcome to Alicia AI</h2>
            <p>Please enter your OpenRouter API Key to continue:</p>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
            <button id="api-key-submit">Start Chat</button>
            <p style="font-size: 12px; margin-top: 15px; opacity: 0.7;">Your key is stored locally in your browser and never sent to our servers.</p>
        </div>
    </div>

    <div id="status-indicator"></div>
    <div id="alicia-bubble"></div>

    <div id="alicia-controls">
        <input type="text" id="alicia-msg" placeholder="Type something to Alicia..." autocomplete="off">
        <button id="alicia-send">🎤</button>
    </div>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let OR_KEY = localStorage.getItem('alicia_or_key') || "";
        let SYSTEM_PROMPT = `أنتِ أليشيا (Alicia)، مساعدة ذكية وودودة بهيئة شخصية أنمي. 
        يجب أن تكون جميع ردودك باللغة اليابانية فقط، حتى لو سألك المستخدم بالعربية. 
        اجعلي الردود قصيرة ومرحة. 
        معلومات إضافية: اسم المستخدم هو غيلان بن عقبة، ويلقب بـ ميجن غيلان أو الملك الأحمر.`;

        let scene, camera, renderer, clock, currentVrm;
        // Get token from localStorage or use public access
        const GITHUB_TOKEN = localStorage.getItem('github_token') || "";
        const GITHUB_USER = "magengillan00-lgtm";
        const GITHUB_REPO = "Alisha";

        const msgInput = document.getElementById('alicia-msg');
        const sendBtn = document.getElementById('alicia-send');
        const bubble = document.getElementById('alicia-bubble');
        const apiKeyOverlay = document.getElementById('api-key-overlay');
        const apiKeyInput = document.getElementById('api-key-input');
        const apiKeySubmit = document.getElementById('api-key-submit');
        const statusIndicator = document.getElementById('status-indicator');

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA'; // Arabic
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                sendBtn.classList.add('recording');
                statusIndicator.textContent = '🎤 Listening...';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                msgInput.value = transcript;
            };

            recognition.onend = () => {
                isRecording = false;
                sendBtn.classList.remove('recording');
                statusIndicator.textContent = '';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                statusIndicator.textContent = '❌ Mic Error';
                setTimeout(() => { statusIndicator.textContent = ''; }, 2000);
            };
        }

        if (OR_KEY) {
            apiKeyOverlay.style.display = 'none';
        }

        apiKeySubmit.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                OR_KEY = key;
                localStorage.setItem('alicia_or_key', key);
                apiKeyOverlay.style.display = 'none';
            }
        });

        // Load memory and skills from GitHub
        async function loadMemoryAndSkills() {
            try {
                // Load memory.json
                const headers = GITHUB_TOKEN ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {};
                const memoryResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/memory.json`,
                    { headers }
                );
                
                if (memoryResponse.ok) {
                    const memoryData = await memoryResponse.json();
                    const memoryContent = JSON.parse(atob(memoryData.content));
                    console.log('Memory loaded:', memoryContent);
                    
                    // Add memory to system prompt
                    if (memoryContent.commands && Array.isArray(memoryContent.commands)) {
                        const memoryText = memoryContent.commands.join('\n');
                        SYSTEM_PROMPT += `\n\nالأوامر المحفوظة:\n${memoryText}`;
                    }
                }

                // Load skills from /skills directory
                const skillsResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/skills`,
                    { headers }
                );

                if (skillsResponse.ok) {
                    const skillsList = await skillsResponse.json();
                    if (Array.isArray(skillsList)) {
                        const skillNames = skillsList
                            .filter(item => item.type === 'dir')
                            .map(item => item.name)
                            .join(', ');
                        
                        if (skillNames) {
                            SYSTEM_PROMPT += `\n\nالمهارات المتاحة: ${skillNames}`;
                        }
                    }
                }

                console.log('Updated System Prompt:', SYSTEM_PROMPT);
            } catch (error) {
                console.warn('Could not load memory/skills:', error);
            }
        }

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Position camera very close to face for close-up view
            camera.position.set(0, 1.5, 0.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            // Target the face area
            controls.target.set(0, 1.5, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // Disable all rotation and panning - keep avatar completely fixed
            controls.enableRotate = false;
            controls.enablePan = false;
            controls.enableZoom = false;
            controls.update();

            new RGBELoader().load('./assets/backgrounds/background.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
            }, undefined, (err) => console.warn("Background HDR not found, using default lighting."));

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(1, 2, 3);
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize);
            
            loadVRM('./assets/models/waifu.vrm');
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function loadVRM(url) {
            const loader = new GLTFLoader();
            loader.register(parser => new VRMLoaderPlugin(parser));
            try {
                const gltf = await loader.loadAsync(url);
                currentVrm = gltf.userData.vrm;
                scene.add(currentVrm.scene);
                VRMUtils.rotateVRM0(currentVrm);
                
                // Load memory and skills after VRM is loaded
                await loadMemoryAndSkills();
                
                document.getElementById('loading-overlay').classList.add('hidden');
            } catch (error) {
                console.error('VRM Load Error:', error);
                document.getElementById('loading-text').innerText = "Error loading Alicia.";
            }
        }

        async function askAlicia(text) {
            if (!OR_KEY) {
                apiKeyOverlay.style.display = 'flex';
                return;
            }
            showBubble("Thinking...");
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${OR_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-001",
                        messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                showBubble(reply);
                speakJapanese(reply);
            } catch (e) { showBubble("Error connecting to Alicia."); }
        }

        function showBubble(text) {
            bubble.innerText = text;
            bubble.style.display = 'block';
            setTimeout(() => { bubble.style.display = 'none'; }, 7000);
        }

        function speakJapanese(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.onstart = () => { startLipSync(); };
            ut.onend = () => { stopLipSync(); };
            window.speechSynthesis.speak(ut);
        }

        let lipSyncInterval;
        function startLipSync() {
            lipSyncInterval = setInterval(() => {
                if (currentVrm && currentVrm.expressionManager) {
                    // Enhanced lip sync with multiple expressions
                    const mouthOpen = 0.6 + Math.random() * 0.4;
                    const mouthSmile = Math.random() * 0.3;
                    
                    currentVrm.expressionManager.setValue('aa', mouthOpen);
                    currentVrm.expressionManager.setValue('ih', mouthOpen * 0.4);
                    currentVrm.expressionManager.setValue('ou', mouthOpen * 0.3);
                    currentVrm.expressionManager.setValue('ee', mouthOpen * 0.2);
                    
                    // Smile during speech
                    if (currentVrm.expressionManager.getValue('smile') !== undefined) {
                        currentVrm.expressionManager.setValue('smile', mouthSmile);
                    }
                }
            }, 80);
        }

        function stopLipSync() {
            clearInterval(lipSyncInterval);
            if (currentVrm && currentVrm.expressionManager) {
                currentVrm.expressionManager.setValue('aa', 0);
                currentVrm.expressionManager.setValue('ih', 0);
                currentVrm.expressionManager.setValue('ou', 0);
                currentVrm.expressionManager.setValue('ee', 0);
                if (currentVrm.expressionManager.getValue('smile') !== undefined) {
                    currentVrm.expressionManager.setValue('smile', 0);
                }
            }
        }

        sendBtn.addEventListener('click', () => {
            if (isRecording) {
                recognition.stop();
            } else {
                const val = msgInput.value.trim();
                if (val) {
                    askAlicia(val);
                    msgInput.value = '';
                } else if (recognition) {
                    recognition.start();
                }
            }
        });

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = msgInput.value.trim();
                if (val) {
                    askAlicia(val);
                    msgInput.value = '';
                }
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) currentVrm.update(delta);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
