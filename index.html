<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicia Ultra</title>

<style>
body { margin:0; overflow:hidden; background:#111; font-family:sans-serif;}
canvas { display:block; }

#controls{
position:fixed; bottom:20px; left:50%;
transform:translateX(-50%);
display:flex; width:90%; max-width:500px;
}

#msg{
flex:1; padding:12px; border-radius:20px;
border:none; background:#222; color:white;
}

#send{
width:60px; border:none; border-radius:50%;
background:#ff4d6d; color:white; font-size:20px;
}

#bubble{
position:fixed; top:40px; left:50%;
transform:translateX(-50%);
background:#000c; color:white;
padding:15px; border-radius:20px;
max-width:80%;
text-align:center;
}
</style>
</head>

<body>

<div id="bubble"></div>

<div id="controls">
<input id="msg" placeholder="Speak or type...">
<button id="send">🎤</button>
</div>

<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
"@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin } from '@pixiv/three-vrm';

// 🔑 ضع مفتاحك هنا
let OR_KEY = "PUT_YOUR_KEY_HERE";

let scene = new THREE.Scene();
let clock = new THREE.Clock();
let camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.1,100);
camera.position.set(0,1.4,0.6);

let renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 إضاءة
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(1,2,3);
scene.add(light);

// 🧠 ذاكرة
let MEMORY = [];

// 🎭 حالة
let state = "idle";

// 📦 تحميل VRM
let loader = new GLTFLoader();
loader.register(parser=>new VRMLoaderPlugin(parser));

let vrm;

loader.load("./assets/models/waifu.vrm",(gltf)=>{
vrm = gltf.userData.vrm;
vrm.scene.rotation.y = Math.PI;
scene.add(vrm.scene);
});

// 🎮 أنيميشن
function animate(){
requestAnimationFrame(animate);

if(vrm){
let t = Date.now()*0.002;

// 👀 تتبع الكاميرا
let head = vrm.humanoid.getBoneNode('head');
if(head){
head.lookAt(camera.position);
}

// 🎭 تعابير
if(vrm.expressionManager){

// reset
vrm.expressionManager.setValue('happy',0);
vrm.expressionManager.setValue('angry',0);
vrm.expressionManager.setValue('sad',0);
vrm.expressionManager.setValue('relaxed',0);

if(state==="idle"){
vrm.expressionManager.setValue('relaxed',0.4);
}

if(state==="talk"){
vrm.expressionManager.setValue('happy',0.6);
}

if(state==="angry"){
vrm.expressionManager.setValue('angry',0.8);
}

if(state==="love"){
vrm.expressionManager.setValue('happy',1);
vrm.expressionManager.setValue('blush',0.7);
}
}

// 👋 wave
let rightArm = vrm.humanoid.getBoneNode('rightUpperArm');

if(state==="wave" && rightArm){
rightArm.rotation.z = -1;
rightArm.rotation.x = Math.sin(t*5)*0.5;
}

vrm.update(clock.getDelta());
}

renderer.render(scene,camera);
}
animate();

// 🗣️ كلام
let lip;

function startTalk(){
state="talk";

lip = setInterval(()=>{
if(vrm?.expressionManager){
vrm.expressionManager.setValue('aa', Math.random()*0.5);
}
},100);
}

function stopTalk(){
state="idle";
clearInterval(lip);
if(vrm?.expressionManager){
vrm.expressionManager.setValue('aa',0);
}
}

// 🧠 تحليل المشاعر
function detectEmotion(text){
if(text.includes("احب") || text.includes("love")) return "love";
if(text.includes("اكره") || text.includes("غبي")) return "angry";
return "talk";
}

// 🤖 AI
async function ask(text){

state = detectEmotion(text);

show("Thinking...");

let res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+OR_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"google/gemini-2.0-flash-001",
messages:[
{role:"system",content:"رد بالياباني وبأسلوب أنمي لطيف"},
...MEMORY,
{role:"user",content:text}
]
})
});

let data = await res.json();

if(!data.choices){
show("API Error");
return;
}

let reply = data.choices[0].message.content;

// 🧠 حفظ ذاكرة
MEMORY.push({role:"user",content:text});
MEMORY.push({role:"assistant",content:reply});

if(MEMORY.length>30) MEMORY = MEMORY.slice(-30);

speak(reply);
show(reply);
}

// 🔊 صوت
function speak(t){
let u = new SpeechSynthesisUtterance(t);
u.lang="ja-JP";

u.onstart=startTalk;
u.onend=()=>state="idle";

speechSynthesis.speak(u);
}

// 💬 واجهة
let msg = document.getElementById("msg");
let btn = document.getElementById("send");
let bubble = document.getElementById("bubble");

function show(t){
bubble.innerText=t;
setTimeout(()=>bubble.innerText="",5000);
}

msg.addEventListener("input",()=>{
btn.textContent = msg.value ? "➤":"🎤";
});

btn.onclick=()=>{
if(msg.value){
ask(msg.value);
msg.value="";
}else{
recognition.start();
}
};

// 🎤 مايك
let recognition = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang="ar";

recognition.onresult=(e)=>{
msg.value = e.results[0][0].transcript;
};

recognition.onend=()=>{
if(msg.value){
ask(msg.value);
msg.value="";
}
};
</script>

</body>
</html>
