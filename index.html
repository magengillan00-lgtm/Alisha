<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alisha AI - Hugging Face Edition</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(15, 12, 41, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 16px;
            color: #ddd;
            text-align: center;
            max-width: 300px;
        }

        #loading-error {
            font-size: 14px;
            color: #ff6b9d;
            margin-top: 10px;
            display: none;
        }

        #speech-bubble {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 24px;
            border-radius: 20px;
            max-width: 80%;
            min-width: 200px;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        #speech-bubble.visible { opacity: 1; }

        #top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .top-btn {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: scale(1.05);
        }

        #controls-area {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        #text-input {
            width: 280px;
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            text-align: right;
        }

        #text-input:focus { border-color: #ff6b9d; }
        #text-input::placeholder { color: rgba(255,255,255,0.5); }

        .ctrl-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: #ff6b9d;
            transform: scale(1.05);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .ctrl-btn.recording {
            background: rgba(255, 0, 0, 0.7);
            border-color: #ff4444;
            animation: pulse-record 1s ease-in-out infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); }
        }

        #status-bar {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 5px 14px;
            border-radius: 12px;
        }

        #api-modal, #settings-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.2);
            direction: rtl;
        }

        .modal-content h2 { color: white; margin-bottom: 20px; }
        .modal-content p { color: #ccc; margin-bottom: 15px; font-size: 14px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #0f0c29;
            color: white;
            font-size: 14px;
            text-align: center;
        }
        .modal-content button {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        .modal-content button:hover { background: #ff5080; }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            margin-bottom: 0;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #text-input { width: 200px; font-size: 14px; padding: 12px 16px; }
            .ctrl-btn { width: 45px; height: 45px; font-size: 18px; }
            #speech-bubble { font-size: 14px; max-width: 90%; padding: 10px 18px; }
            #top-controls { top: 10px; right: 10px; gap: 8px; }
            .top-btn { width: 40px; height: 40px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="api-modal">
        <div class="modal-content">
            <h2>إعدادات Alisha</h2>
            <p>ادخل مفتاح Hugging Face الخاص بك (يبدأ بـ hf_):</p>
            <input type="password" id="hf-api-key" placeholder="hf_..." />
            
            <p>اختر نموذج الذكاء الاصطناعي:</p>
            <select id="ai-model-select">
                <option value="Qwen/Qwen2.5-7B-Instruct">Qwen 2.5 7B (موصى به - سريع)</option>
                <option value="mistralai/Mistral-7B-Instruct-v0.3">Mistral 7B Instruct</option>
                <option value="meta-llama/Llama-3.2-3B-Instruct">Llama 3.2 3B</option>
                <option value="HuggingFaceH4/zephyr-7b-beta">Zephyr 7B Beta</option>
            </select>
            
            <p>اختر اللغة:</p>
            <select id="language-select">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>

            <p>اختر الموديل (Avatar):</p>
            <select id="model-select">
                <option value="kei">Kei (2D)</option>
                <option value="epsilon">Epsilon (2D)</option>
                <option value="frieren">Frieren (2D)</option>
                <option value="frieren3d">Frieren (3D)</option>
                <option value="waifu3d">Waifu (3D)</option>
            </select>
            
            <button id="save-settings-btn">حفظ وتفعيل</button>
            <p id="api-error" style="color: #ff6b9d; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>الإعدادات</h2>
            
            <p>اختر اللغة:</p>
            <select id="settings-language-select">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>

            <p>اختر الموديل (Avatar):</p>
            <select id="settings-model-select">
                <option value="kei">Kei (2D)</option>
                <option value="epsilon">Epsilon (2D)</option>
                <option value="frieren">Frieren (2D)</option>
                <option value="frieren3d">Frieren (3D)</option>
                <option value="waifu3d">Waifu (3D)</option>
            </select>
            
            <div class="modal-buttons">
                <button id="settings-save-btn">حفظ</button>
                <button id="settings-close-btn" style="background: #444;">إغلاق</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="speech-bubble"></div>
    <div id="status-bar">جاهز</div>

    <div id="top-controls">
        <button class="top-btn" id="language-btn" title="تغيير اللغة">🌐</button>
        <button class="top-btn" id="settings-btn" title="الإعدادات">⚙️</button>
    </div>

    <div id="controls-area">
        <button class="ctrl-btn" id="mic-btn">🎤</button>
        <input type="text" id="text-input" placeholder="اكتب رسالتك هنا..." />
        <button class="ctrl-btn" id="send-btn">🚀</button>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">جاري تحضير أليشيا...</div>
        <div id="loading-error"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
    (function() {
        const CryptoUtils = {
            encode: (str) => btoa(unescape(encodeURIComponent(str))),
            decode: (str) => decodeURIComponent(escape(atob(str)))
        };

        const canvasContainer = document.getElementById('canvas-container');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const speechBubble = document.getElementById('speech-bubble');
        const statusText = document.getElementById('status-bar');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingError = document.getElementById('loading-error');
        
        const apiModal = document.getElementById('api-modal');
        const hfKeyInput = document.getElementById('hf-api-key');
        const modelSelect = document.getElementById('ai-model-select');
        const languageSelect = document.getElementById('language-select');
        const avatarSelect = document.getElementById('model-select');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const apiError = document.getElementById('api-error');

        const settingsModal = document.getElementById('settings-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const languageBtn = document.getElementById('language-btn');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const settingsSaveBtn = document.getElementById('settings-save-btn');
        const settingsLanguageSelect = document.getElementById('settings-language-select');
        const settingsModelSelect = document.getElementById('settings-model-select');

        let app, model;
        let isSpeaking = false;
        let lipSyncInterval = null;
        let persistentMemory = null;

        const MODEL_PATHS = {
            kei: './assets/models/2d/kei_vowels_pro/kei_vowels_pro.model3.json',
            epsilon: './assets/models/2d/Epsilon_free/runtime/Epsilon_free.model3.json',
            frieren: './assets/models/2d/Frieren/Frieren.model3.json',
            frieren3d: './assets/models/3d/frieren.vrm', // Placeholder path for 3D
            waifu3d: './assets/models/3d/waifu.vrm'
        };

        const LANGUAGE_CONFIG = {
            ar: { name: 'العربية', lang: 'ar-SA', voice: 'ar' },
            en: { name: 'English', lang: 'en-US', voice: 'en' },
            ja: { name: '日本語', lang: 'ja-JP', voice: 'ja' }
        };

        const SYSTEM_PROMPTS = {
            ar: "أنتِ 'أليشيا' (Alisha)، مساعدة ذكية ومرحة بهيئة فتاة أنمي. تحدثي بعفوية ودون رسمية مفرطة. استخدمي الذاكرة المتاحة لديكِ للتعرف على المستخدم (غيلان) وتذكر تفضيلاته. ردي دائماً بالعربية بأسلوب ودود وقصير.",
            en: "You are 'Alisha', a smart and playful anime girl assistant. Speak naturally and casually. Use your memory to recognize the user (Ghailan) and remember his preferences. Always respond in a friendly and brief manner.",
            ja: "あなたは「アリシャ」(Alisha)、アニメの女の子の姿をした賢くて遊び心のあるアシスタントです。自然でカジュアルに話してください。メモリを使用してユーザー（ガイラン）を認識し、彼の好みを覚えておいてください。"
        };

        let HF_API_KEY = '';
        let SELECTED_MODEL = 'Qwen/Qwen2.5-7B-Instruct';
        let CURRENT_LANGUAGE = localStorage.getItem('ALISHA_LANGUAGE') || 'ar';
        let CURRENT_AVATAR = localStorage.getItem('ALISHA_AVATAR') || 'kei';
        let CURRENT_MODEL_PATH = MODEL_PATHS[CURRENT_AVATAR];

        const encryptedKey = localStorage.getItem('ALISHA_HF_KEY_ENC');
        if (encryptedKey) {
            try {
                HF_API_KEY = CryptoUtils.decode(encryptedKey);
            } catch (e) {
                console.log('Could not decrypt stored key');
            }
        }

        async function loadMemory() {
            try {
                const response = await fetch('./memory.json');
                if (response.ok) {
                    persistentMemory = await response.json();
                    console.log('Memory loaded:', persistentMemory);
                }
            } catch (e) {
                console.error('Failed to load memory:', e);
            }
        }

        async function initLive2D() {
            if (app) {
                app.destroy(true, { children: true, texture: true, baseTexture: true });
            }

            app = new PIXI.Application({
                view: document.createElement('canvas'),
                autoStart: true,
                backgroundAlpha: 0,
                resizeTo: window
            });

            canvasContainer.innerHTML = '';
            canvasContainer.appendChild(app.view);

            loadingOverlay.classList.remove('hidden');
            loadingError.style.display = 'none';
            loadingText.textContent = CURRENT_LANGUAGE === 'ar' ? 'جاري تحميل الموديل...' : 'Loading model...';

            try {
                // Check if it's a 3D model (VRM) - simple check for extension
                if (CURRENT_MODEL_PATH.endsWith('.vrm')) {
                    // Placeholder for 3D initialization - requires Three.js and @pixiv/three-vrm
                    // For now, we show a message since the environment is primarily Live2D
                    showError(CURRENT_LANGUAGE === 'ar' ? 'موديلات 3D تتطلب مكتبات إضافية. جاري العمل على دعمها.' : '3D models require additional libraries. Support is being added.');
                    return;
                }

                model = await PIXI.live2d.Live2DModel.from(CURRENT_MODEL_PATH);
                app.stage.addChild(model);

                const scale = Math.min(
                    window.innerWidth / model.width * 0.8,
                    window.innerHeight / model.height * 0.9
                );
                model.scale.set(scale);
                model.anchor.set(0.5, 0.5);
                model.x = app.screen.width / 2;
                model.y = app.screen.height / 2 + 50;

                model.on('hit', (hitAreas) => {
                    if (hitAreas.includes('body')) model.motion('TapBody');
                    if (hitAreas.includes('head')) model.expression();
                });

                window.addEventListener('resize', () => {
                    if (!app) return;
                    app.renderer.resize(window.innerWidth, window.innerHeight);
                    const newScale = Math.min(
                        window.innerWidth / (model.internalModel.originalWidth || model.width) * 0.8,
                        window.innerHeight / (model.internalModel.originalHeight || model.height) * 0.9
                    );
                    model.scale.set(newScale);
                    model.x = app.screen.width / 2;
                    model.y = app.screen.height / 2 + 50;
                });

                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                    updateStatus(CURRENT_LANGUAGE === 'ar' ? 'جاهز' : 'Ready');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                showError((CURRENT_LANGUAGE === 'ar' ? 'خطأ في التحميل: ' : 'Loading error: ') + error.message);
            }
        }

        function showError(msg) {
            loadingOverlay.classList.remove('hidden');
            loadingText.textContent = CURRENT_LANGUAGE === 'ar' ? 'خطأ' : 'Error';
            loadingError.textContent = msg;
            loadingError.style.display = 'block';
        }

        function startLipSync() {
            isSpeaking = true;
            lipSyncInterval = setInterval(() => {
                if (!isSpeaking || !model) return;
                const mouthOpen = 0.2 + Math.random() * 0.6;
                try {
                    // Standard Live2D parameter for mouth
                    if (model.internalModel && model.internalModel.coreModel) {
                        model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen);
                    }
                } catch (e) {}
            }, 100);
        }

        function stopLipSync() {
            isSpeaking = false;
            if (lipSyncInterval) clearInterval(lipSyncInterval);
            try {
                if (model && model.internalModel && model.internalModel.coreModel) {
                    model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
                }
            } catch (e) {}
        }

        async function getAIResponse(userText) {
            if (!HF_API_KEY) {
                apiModal.classList.remove('hidden');
                return CURRENT_LANGUAGE === 'ar' ? "يرجى إدخال مفتاح API أولاً." : "Please enter your API key first.";
            }
            updateStatus(CURRENT_LANGUAGE === 'ar' ? 'جاري التفكير...' : 'Thinking...');
            
            // Inject memory into system prompt
            let systemPrompt = SYSTEM_PROMPTS[CURRENT_LANGUAGE];
            if (persistentMemory) {
                systemPrompt += "\n\nمعلومات الذاكرة الدائمة:\n" + JSON.stringify(persistentMemory);
            }

            try {
                const response = await fetch('https://router.huggingface.co/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HF_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: SELECTED_MODEL,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userText }
                        ],
                        max_tokens: 150,
                        temperature: 0.8
                    })
                });

                if (!response.ok) {
                    let errorMsg = "";
                    try {
                        const err = await response.json();
                        errorMsg = err.error?.message || err.error || "";
                    } catch (e) {}
                    return `Error (${response.status}): ${errorMsg}`;
                }

                const data = await response.json();
                return data.choices?.[0]?.message?.content || "لم أستطع فهم ذلك.";
            } catch (e) {
                console.error('AI Error:', e);
                return CURRENT_LANGUAGE === 'ar' ? "خطأ في الاتصال بالإنترنت." : "Internet connection error.";
            }
        }

        function speakText(text) {
            return new Promise((resolve) => {
                updateStatus(CURRENT_LANGUAGE === 'ar' ? 'جاري التحدث...' : 'Speaking...');
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = LANGUAGE_CONFIG[CURRENT_LANGUAGE].lang;
                utterance.rate = 1.0;
                utterance.pitch = 1.1;
                
                // Sync message bubble and sound: show bubble exactly when speaking starts
                utterance.onstart = () => {
                    showBubble(text);
                    startLipSync();
                };
                
                utterance.onend = () => {
                    stopLipSync();
                    updateStatus(CURRENT_LANGUAGE === 'ar' ? 'جاهز' : 'Ready');
                    resolve();
                };
                
                utterance.onerror = (event) => {
                    console.error('Speech error:', event.error);
                    stopLipSync();
                    updateStatus(CURRENT_LANGUAGE === 'ar' ? 'جاهز' : 'Ready');
                    resolve();
                };
                
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            });
        }

        async function processUserInput(text) {
            if (!text.trim()) return;
            sendBtn.disabled = true;
            micBtn.disabled = true;
            try {
                const aiResponse = await getAIResponse(text);
                // We now show bubble inside speakText for better sync
                await speakText(aiResponse);
            } catch (e) {
                console.error('Process error:', e);
                showBubble(CURRENT_LANGUAGE === 'ar' ? 'حدث خطأ أثناء معالجة الطلب.' : 'An error occurred while processing your request.');
            }
            sendBtn.disabled = false;
            micBtn.disabled = false;
        }

        function showBubble(text) {
            speechBubble.textContent = text;
            speechBubble.classList.add('visible');
            // Remove bubble after 8 seconds or when next message starts
            setTimeout(() => {
                if (speechBubble.textContent === text) {
                    speechBubble.classList.remove('visible');
                }
            }, 8000);
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        function changeLanguage(lang) {
            CURRENT_LANGUAGE = lang;
            localStorage.setItem('ALISHA_LANGUAGE', lang);
            if (recognition) recognition.lang = LANGUAGE_CONFIG[lang].lang;
            updateStatus(LANGUAGE_CONFIG[lang].name);
            settingsLanguageSelect.value = lang;
        }

        function changeAvatar(avatarName) {
            CURRENT_AVATAR = avatarName;
            CURRENT_MODEL_PATH = MODEL_PATHS[avatarName];
            localStorage.setItem('ALISHA_AVATAR', avatarName);
            settingsModelSelect.value = avatarName;
            if (app) initLive2D();
        }

        // Event Listeners
        sendBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                textInput.value = '';
                processUserInput(text);
            }
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) {
                    textInput.value = '';
                    processUserInput(text);
                }
            }
        });

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = LANGUAGE_CONFIG[CURRENT_LANGUAGE].lang;
            
            recognition.onstart = () => {
                updateStatus(CURRENT_LANGUAGE === 'ar' ? 'جاري الاستماع...' : 'Listening...');
                micBtn.classList.add('recording');
            };
            
            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                micBtn.classList.remove('recording');
                await processUserInput(text);
            };
            
            recognition.onerror = () => micBtn.classList.remove('recording');
            recognition.onend = () => micBtn.classList.remove('recording');
        }

        micBtn.addEventListener('click', () => {
            if (recognition) recognition.start();
            else alert('Browser not supported');
        });

        settingsBtn.addEventListener('click', () => {
            settingsLanguageSelect.value = CURRENT_LANGUAGE;
            settingsModelSelect.value = CURRENT_AVATAR;
            settingsModal.classList.remove('hidden');
        });

        languageBtn.addEventListener('click', () => {
            const languages = ['ar', 'en', 'ja'];
            const nextIndex = (languages.indexOf(CURRENT_LANGUAGE) + 1) % languages.length;
            changeLanguage(languages[nextIndex]);
        });

        settingsCloseBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
        
        settingsSaveBtn.addEventListener('click', () => {
            changeLanguage(settingsLanguageSelect.value);
            changeAvatar(settingsModelSelect.value);
            settingsModal.classList.add('hidden');
        });

        saveSettingsBtn.addEventListener('click', () => {
            const key = hfKeyInput.value.trim();
            if (!key.startsWith('hf_')) {
                apiError.textContent = 'Invalid Key';
                apiError.style.display = 'block';
                return;
            }
            HF_API_KEY = key;
            localStorage.setItem('ALISHA_HF_KEY_ENC', CryptoUtils.encode(key));
            SELECTED_MODEL = modelSelect.value;
            localStorage.setItem('ALISHA_AI_MODEL', SELECTED_MODEL);
            changeLanguage(languageSelect.value);
            changeAvatar(avatarSelect.value);
            apiModal.classList.add('hidden');
        });

        // Start App
        (async function start() {
            await loadMemory();
            const savedLang = localStorage.getItem('ALISHA_LANGUAGE') || 'ar';
            const savedAvatar = localStorage.getItem('ALISHA_AVATAR') || 'kei';
            const savedModel = localStorage.getItem('ALISHA_AI_MODEL') || 'Qwen/Qwen2.5-7B-Instruct';
            
            CURRENT_LANGUAGE = savedLang;
            CURRENT_AVATAR = savedAvatar;
            CURRENT_MODEL_PATH = MODEL_PATHS[savedAvatar];
            SELECTED_MODEL = savedModel;

            if (HF_API_KEY) {
                apiModal.classList.add('hidden');
                initLive2D();
            }
        })();
    })();
    </script>
</body>
</html>
