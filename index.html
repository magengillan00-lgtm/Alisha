
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alisha AI - Modern Glass Edition</title>

    <style>
        :root {
            --primary-color: #ff6b9d;
            --primary-glow: rgba(255, 107, 157, 0.5);
            --bg-dark: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: radial-gradient(circle at center, #1b1b3a 0%, #0f0c29 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            transition: opacity 0.6s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modern Glass Controls */
        #top-controls {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .glass-btn {
            width: 48px; height: 48px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .glass-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        #controls-area {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            justify-content: center;
        }

        #text-input {
            flex: 1;
            padding: 16px 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            text-align: right;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #text-input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.15);
        }

        .action-btn {
            width: 56px; height: 56px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .action-btn:hover { background: var(--primary-color); border-color: var(--primary-color); transform: scale(1.05); }
        .action-btn.recording {
            background: #ff4444;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.7); } 70% { box-shadow: 0 0 0 15px rgba(255,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); } }

        #stop-btn {
            background: rgba(255, 68, 68, 0.2);
            border-color: #ff4444;
            color: #ff4444;
            display: none; /* Hidden by default */
        }
        #stop-btn.visible { display: flex; }

        #status-bar {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 100px;
            backdrop-filter: blur(5px);
            white-space: nowrap;
            border: 1px solid var(--glass-border);
        }

        /* Modals */
        #api-modal, #settings-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            padding: 35px;
            border-radius: 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 40px rgba(255, 107, 157, 0.3);
            direction: rtl;
        }
        .modal-content h2 { color: white; margin-bottom: 20px; font-weight: 600; }
        .modal-content p { color: #aaa; margin-bottom: 15px; font-size: 14px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            background: #0f0c29;
            color: white;
            font-size: 15px;
            text-align: center;
            outline: none;
        }
        .modal-content button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .modal-content button:hover { background: #ff5080; transform: scale(1.02); }
        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #text-input { width: 180px; padding: 12px; }
            .action-btn { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div id="api-modal">
        <div class="modal-content">
            <h2>⚡ KiloClaw Edition</h2>
            <p style="color:#aaffaa;">✅ أليشيا مدعومة بـ KiloClaw AI</p>
            <p style="color:#ccc; font-size:13px;">لا تحتاج مفتاح API — الذكاء الاصطناعي يعمل من الخادم مباشرة.</p>
            <p>اللغة الافتراضية:</p>
            <select id="language-select">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
            <p>الأفاتار:</p>
            <select id="model-select">
                <option value="kei">Kei (2D)</option>
                <option value="epsilon">Epsilon (2D)</option>
                <option value="frieren">Frieren (2D)</option>
                <option value="waifu3d">Waifu (3D)</option>
            </select>
            <button id="save-settings-btn">تفعيل أليشيا</button>
            <p id="api-error" style="color: #ff6b9d; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>تخصيص</h2>
            <p>اللغة:</p>
            <select id="settings-language-select">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
            <p>الأفاتار:</p>
            <select id="settings-model-select">
                <option value="kei">Kei (2D)</option>
                <option value="epsilon">Epsilon (2D)</option>
                <option value="frieren">Frieren (2D)</option>
                <option value="waifu3d">Waifu (3D)</option>
            </select>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="settings-save-btn">حفظ</button>
                <button id="settings-close-btn" style="background: #444;">إغلاق</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="status-bar">جاهز</div>

    <div id="top-controls">
        <button class="glass-btn" id="language-btn" title="اللغة">🌐</button>
        <button class="glass-btn" id="settings-btn" title="الإعدادات">⚙️</button>
    </div>

    <div id="controls-area">
        <button class="action-btn" id="mic-btn">🎤</button>
        <input type="text" id="text-input" placeholder="تحدثي معي يا أليشيا..." />
        <button class="action-btn" id="send-btn">🚀</button>
        <button class="action-btn" id="stop-btn">🛑</button>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">جاري استدعاء أليشيا...</div>
        <div id="loading-error"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.177.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
    } }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    (function() {
        const CryptoUtils = {
            encode: (str) => btoa(unescape(encodeURIComponent(str))),
            decode: (str) => decodeURIComponent(escape(atob(str)))
        };

        const canvasContainer = document.getElementById('canvas-container');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const micBtn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status-bar');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingError = document.getElementById('loading-error');
        const apiModal = document.getElementById('api-modal');
        const hfKeyInput = document.getElementById('hf-api-key');
        const modelSelect = document.getElementById('ai-model-select');
        const languageSelect = document.getElementById('language-select');
        const avatarSelect = document.getElementById('model-select');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const apiError = document.getElementById('api-error');
        const settingsModal = document.getElementById('settings-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const languageBtn = document.getElementById('language-btn');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const settingsSaveBtn = document.getElementById('settings-save-btn');
        const settingsLanguageSelect = document.getElementById('settings-language-select');
        const settingsModelSelect = document.getElementById('settings-model-select');

        let pixiApp, live2dModel;
        let threeScene, threeCamera, threeRenderer, threeClock, currentVrm;
        let is3D = false, isSpeaking = false;
        let lipSyncAnimationId = null, abortController = null;
        let persistentMemory = null;

        const MODEL_PATHS = {
            kei: './assets/models/2d/kei_vowels_pro/kei_vowels_pro.model3.json',
            epsilon: './assets/models/2d/Epsilon_free/runtime/Epsilon_free.model3.json',
            frieren: './assets/models/2d/Frieren/Frieren.model3.json',
            waifu3d: './assets/models/3d/waifu.vrm'
        };

        const LANGUAGE_CONFIG = {
            ar: { name: 'العربية', lang: 'ar-SA' },
            en: { name: 'English', lang: 'en-US' },
            ja: { name: '日本語', lang: 'ja-JP' }
        };

        // نظام توجيه صارم جداً لمنع تداخل اللغات
        const SYSTEM_PROMPTS = {
            ar: "أنتِ 'أليشيا'، فتاة أنمي ذكية ومرحة. [أمر قطعي]: يجب أن تكون جميع ردودك باللغة العربية فقط وبشكل حصري. يمنع منعاً باتاً استخدام أي لغة أخرى (مثل الصينية أو الإنجليزية) حتى لو تحدث المستخدم بلغة مختلفة. كوني ودودة ومختصرة.",
            en: "You are 'Alisha', a playful anime girl. [STRICT ORDER]: You MUST respond exclusively in English. Do not use any other language under any circumstances, even if the user speaks a different language. Be friendly and brief.",
            ja: "あなたは「アリシャ」です。[絶対命令]: ユーザーが何語で話しかけても、必ず**日本語のみ**で返答してください。他の言語（中国語や英語など）を混ぜることは絶対に禁止されています。短く、可愛らしく話してください。"
        };

        // ── KiloClaw Backend ──────────────────────────────────────────
        const KILOCLAW_BACKEND = 'https://fish-sleep-cooling-lectures.trycloudflare.com';
        let BACKEND_READY = false;

        // فحص الـ Backend عند التشغيل
        fetch(KILOCLAW_BACKEND + '/status')
          .then(r => r.json())
          .then(d => { if (d.status === 'online') { BACKEND_READY = true; console.log('✅ KiloClaw Backend connected'); } })
          .catch(() => { console.warn('⚠️ KiloClaw Backend offline'); });

        let SELECTED_MODEL = 'llama-3.3-70b-versatile';
        let CURRENT_LANGUAGE = localStorage.getItem('ALISHA_LANGUAGE') || 'ar';
        let CURRENT_AVATAR = localStorage.getItem('ALISHA_AVATAR') || 'kei';
        let CURRENT_MODEL_PATH = MODEL_PATHS[CURRENT_AVATAR];

        async function loadMemory() {
            try {
                const response = await fetch('./memory.json');
                if (response.ok) persistentMemory = await response.json();
            } catch (e) {}
        }

        function clearCanvases() {
            if (pixiApp) { pixiApp.destroy(true, { children: true, texture: true, baseTexture: true }); pixiApp = null; }
            if (threeRenderer) { threeRenderer.dispose(); threeRenderer.domElement.remove(); threeRenderer = null; threeScene = null; }
            canvasContainer.innerHTML = '';
        }

        function handleResize() {
            if (is3D && threeCamera && threeRenderer) {
                threeCamera.aspect = window.innerWidth / window.innerHeight;
                threeCamera.updateProjectionMatrix();
                threeRenderer.setSize(window.innerWidth, window.innerHeight);
            }
            if (pixiApp) {
                pixiApp.renderer.resize(window.innerWidth, window.innerHeight);
                if (live2dModel) updateLive2DScale();
            }
        }

        function updateLive2DScale() {
            if (!live2dModel) return;
            const scale = Math.min(window.innerWidth / live2dModel.width * 0.8, window.innerHeight / live2dModel.height * 0.9);
            live2dModel.scale.set(scale);
            live2dModel.anchor.set(0.5, 0.5);
            live2dModel.x = window.innerWidth / 2;
            live2dModel.y = window.innerHeight / 2 + 50;
        }

        async function initAvatar() {
            clearCanvases();
            loadingOverlay.classList.remove('hidden');
            if (CURRENT_MODEL_PATH.endsWith('.vrm')) { is3D = true; await init3D(); }
            else { is3D = false; await initLive2D(); }
        }

        async function initLive2D() {
            try {
                pixiApp = new PIXI.Application({ view: document.createElement('canvas'), autoStart: true, backgroundAlpha: 0, resizeTo: window });
                canvasContainer.appendChild(pixiApp.view);
                live2dModel = await PIXI.live2d.Live2DModel.from(CURRENT_MODEL_PATH);
                pixiApp.stage.addChild(live2dModel);
                updateLive2DScale();
                window.addEventListener('resize', handleResize);
                loadingOverlay.classList.add('hidden');
                updateStatus('Ready');
            } catch (e) { showError(e.message); }
        }

        async function init3D() {
            try {
                threeScene = new THREE.Scene();
                threeClock = new THREE.Clock();
                threeCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                threeCamera.position.set(0, 1.4, 1.5);
                threeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                threeRenderer.setSize(window.innerWidth, window.innerHeight);
                threeRenderer.setPixelRatio(window.devicePixelRatio);
                threeRenderer.toneMapping = THREE.ACESFilmicToneMapping;
                canvasContainer.appendChild(threeRenderer.domElement);

                const controls = new OrbitControls(threeCamera, threeRenderer.domElement);
                controls.target.set(0, 1.2, 0);
                controls.update();

                threeScene.add(new THREE.AmbientLight(0xffffff, 0.5));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(1, 1, 1).normalize();
                threeScene.add(dirLight);

                new RGBELoader().load('./assets/backgrounds/background.hdr', (texture) => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    threeScene.environment = texture;
                }, undefined, () => {});

                const loader = new GLTFLoader();
                loader.register(parser => new VRMLoaderPlugin(parser));
                const gltf = await loader.loadAsync(CURRENT_MODEL_PATH);
                currentVrm = gltf.userData.vrm;
                threeScene.add(currentVrm.scene);
                VRMUtils.rotateVRM0(currentVrm);

                const animate = () => {
                    if (!threeRenderer) return;
                    requestAnimationFrame(animate);
                    const dt = threeClock.getDelta();
                    if (currentVrm) {
                        currentVrm.update(dt);
                        const time = threeClock.elapsedTime;
                        currentVrm.humanoid.getBoneNode('spine').rotation.z = Math.sin(time * 0.5) * 0.02;
                        currentVrm.humanoid.getBoneNode('head').rotation.y = Math.sin(time * 0.8) * 0.05;
                    }
                    threeRenderer.render(threeScene, threeCamera);
                };
                animate();
                window.addEventListener('resize', handleResize);
                loadingOverlay.classList.add('hidden');
                updateStatus('Ready');
            } catch (e) { showError(e.message); }
        }

        function showError(msg) {
            loadingOverlay.classList.remove('hidden');
            loadingError.textContent = msg;
            loadingError.style.display = 'block';
        }

        function startLipSync() {
            isSpeaking = true;
            let startTime = performance.now();
            function animateMouth() {
                if (!isSpeaking) return;
                const elapsed = performance.now() - startTime;
                const mouthOpenValue = 0.3 + Math.sin(elapsed * 0.015) * 0.2;
                if (is3D && currentVrm) currentVrm.expressionManager.setValue('aa', mouthOpenValue);
                else if (live2dModel && live2dModel.internalModel?.coreModel) live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', mouthOpenValue);
                lipSyncAnimationId = requestAnimationFrame(animateMouth);
            }
            lipSyncAnimationId = requestAnimationFrame(animateMouth);
        }

        function stopLipSync() {
            isSpeaking = false;
            if (lipSyncAnimationId) cancelAnimationFrame(lipSyncAnimationId);
            if (is3D && currentVrm) currentVrm.expressionManager.setValue('aa', 0);
            else if (live2dModel && live2dModel.internalModel?.coreModel) live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
        }

        async function getAIResponse(userText) {
            updateStatus('Thinking...');
            abortController = new AbortController();

            try {
                // ── إرسال للـ KiloClaw Backend ──────────────────────────
                const response = await fetch(KILOCLAW_BACKEND + '/chat', {
                    method: 'POST',
                    signal: abortController.signal,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userText,
                        language: CURRENT_LANGUAGE,
                        memory: persistentMemory
                    })
                });
                const data = await response.json();
                return data.reply || "لم أفهم الطلب.";
            } catch (e) {
                if (e.name === 'AbortError') return null;
                return "تعذّر الاتصال بالخادم. تأكد من تشغيل KiloClaw Backend.";
            }
        }

        function speakText(text) {
            return new Promise((resolve) => {
                if (!text) return resolve();
                updateStatus('Speaking...');
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = LANGUAGE_CONFIG[CURRENT_LANGUAGE].lang;
                utterance.onstart = () => startLipSync();
                utterance.onend = () => { stopLipSync(); updateStatus('Ready'); resolve(); };
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            });
        }

        async function processUserInput(text) {
            if (!text.trim()) return;
            sendBtn.disabled = true; micBtn.disabled = true;
            stopBtn.classList.add('visible');
            try {
                const aiResponse = await getAIResponse(text);
                if (aiResponse) await speakText(aiResponse);
            } catch (e) { console.error(e); }
            sendBtn.disabled = false; micBtn.disabled = false;
            stopBtn.classList.remove('visible');
        }

        function stopAll() {
            if (abortController) abortController.abort();
            window.speechSynthesis.cancel();
            stopLipSync();
            updateStatus('Stopped');
            stopBtn.classList.remove('visible');
        }

        function updateStatus(text) { statusText.textContent = text; }

        function changeLanguage(lang) {
            CURRENT_LANGUAGE = lang;
            localStorage.setItem('ALISHA_LANGUAGE', lang);
            updateStatus(LANGUAGE_CONFIG[lang].name);
            settingsLanguageSelect.value = lang;
        }

        function changeAvatar(avatarName) {
            CURRENT_AVATAR = avatarName;
            CURRENT_MODEL_PATH = MODEL_PATHS[avatarName];
            localStorage.setItem('ALISHA_AVATAR', avatarName);
            settingsModelSelect.value = avatarName;
            initAvatar();
        }

        textInput.addEventListener('focus', () => setTimeout(handleResize, 300));
        textInput.addEventListener('blur', () => setTimeout(handleResize, 300));
        sendBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) { textInput.value = ''; processUserInput(text); }
        });
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) { textInput.value = ''; processUserInput(text); }
            }
        });
        stopBtn.addEventListener('click', stopAll);

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA'; 
            recognition.onstart = () => micBtn.classList.add('recording');
            recognition.onresult = (event) => processUserInput(event.results[0][0].transcript);
            recognition.onend = () => micBtn.classList.remove('recording');
            recognition.onerror = () => micBtn.classList.remove('recording');
        }

        micBtn.addEventListener('click', () => {
