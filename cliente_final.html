<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alicia AI - Interactive Avatar</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas { display: block; }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(20, 20, 30, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #controlButton {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            background-color: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
            display: none;
            z-index: 10;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #controlButton:disabled { cursor: not-allowed; opacity: 0.5; }
        #controlButton.recording { 
            background-color: rgba(255, 0, 0, 0.7); 
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        
        #status-text {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading Alicia and her world...</p>
    </div>

    <div id="status-text">Ready to talk</div>
    <button id="controlButton">🎤</button>
    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.177.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // -- CONFIGURATION --
        const GEMINI_API_KEY = "AIzaSyBam_QaB2ogtvxiqCEkKMGwdqHSkNdqUdE";
        const SYSTEM_PROMPT = "أنتِ أليشيا (Alicia)، مساعدة ذكية وودودة بهيئة شخصية أنمي. ردي دائماً باختصار وبأسلوب مرح باللغة العربية. يجب ألا تتجاوز إجابتك جملتين.";
        const assetPathPrefix = '/assets/';
        const talkingAnimationNames = ['animations/anim_1', 'animations/anim_2', 'animations/anim_3'];

        let scene, camera, renderer, clock, mixer;
        let currentVrm = null;
        let idleAction, currentAction;
        const controlButton = document.getElementById('controlButton');
        const audioPlayer = document.getElementById('audioPlayer');
        const statusText = document.getElementById('status-text');
        const animationsMap = new Map();

        // -- Web Speech API for STT --
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }

        const blinkManager = {
            isBlinking: false, blinkTimer: 0, nextBlinkTime: 0, timeSinceLastBlink: 0,
            BLINK_DURATION: 0.15, BLINK_INTERVAL_MIN: 2.0, BLINK_INTERVAL_MAX: 8.0,
        };
        
        const lipSyncContext = {
            initialized: false, audioContext: null, analyser: null, dataArray: null,
            currentVolume: 0,
        };

        const mixamoVRMRigMap = {
            mixamorigHips: 'hips', mixamorigSpine: 'spine', mixamorigSpine1: 'chest',
            mixamorigSpine2: 'upperChest', mixamorigNeck: 'neck', mixamorigHead: 'head',
            mixamorigLeftShoulder: 'leftShoulder', mixamorigLeftArm: 'leftUpperArm',
            mixamorigLeftForeArm: 'leftLowerArm', mixamorigLeftHand: 'leftHand',
            mixamorigRightShoulder: 'rightShoulder', mixamorigRightArm: 'rightUpperArm',
            mixamorigRightForeArm: 'rightLowerArm', mixamorigRightHand: 'rightHand',
            mixamorigLeftUpLeg: 'leftUpperLeg', mixamorigLeftLeg: 'leftLowerLeg',
            mixamorigLeftFoot: 'leftFoot', mixamorigLeftToeBase: 'leftToes',
            mixamorigRightUpLeg: 'rightUpperLeg', mixamorigRightLeg: 'rightLowerLeg',
            mixamorigRightFoot: 'rightFoot', mixamorigRightToeBase: 'rightToes',
        };

        function scheduleNextBlink() {
            blinkManager.nextBlinkTime = blinkManager.BLINK_INTERVAL_MIN + Math.random() * (blinkManager.BLINK_INTERVAL_MAX - blinkManager.BLINK_INTERVAL_MIN);
        }

        async function loadMixamoAnimation(url, vrm) {
            const loader = new FBXLoader();
            const asset = await loader.loadAsync(url);
            const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com');
            const tracks = [];
            const restRotationInverse = new THREE.Quaternion();
            const parentRestWorldRotation = new THREE.Quaternion();
            const _quatA = new THREE.Quaternion();
            const motionHipsHeight = asset.getObjectByName('mixamorigHips').position.y;
            const vrmHipsHeight = vrm.humanoid.getNormalizedBoneNode('hips').position.y;
            const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

            clip.tracks.forEach((track) => {
                const trackSplitted = track.name.split('.');
                const mixamoRigName = trackSplitted[0];
                const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
                const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
                if (vrmNodeName != null) {
                    const propertyName = trackSplitted[1];
                    const mixamoRigNode = asset.getObjectByName(mixamoRigName);
                    mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
                    mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);
                    if (track instanceof THREE.QuaternionKeyframeTrack) {
                        for (let i = 0; i < track.values.length; i += 4) {
                            const flatQuaternion = track.values.slice(i, i + 4);
                            _quatA.fromArray(flatQuaternion).premultiply(parentRestWorldRotation).multiply(restRotationInverse).toArray(flatQuaternion);
                            flatQuaternion.forEach((v, index) => { track.values[index + i] = v; });
                        }
                        tracks.push(new THREE.QuaternionKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v))));
                    } else if (track instanceof THREE.VectorKeyframeTrack) {
                        const value = track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 3 !== 1 ? -v : v) * hipsPositionScale);
                        tracks.push(new THREE.VectorKeyframeTrack(`${vrmNodeName}.${propertyName}`, track.times, value));
                    }
                }
            });
            return new THREE.AnimationClip(clip.name, clip.duration, tracks);
        }

        function setupLipSync() {
            if (lipSyncContext.initialized) return;
            lipSyncContext.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = lipSyncContext.audioContext.createMediaElementSource(audioPlayer);
            lipSyncContext.analyser = lipSyncContext.audioContext.createAnalyser();
            lipSyncContext.analyser.fftSize = 256;
            lipSyncContext.dataArray = new Uint8Array(lipSyncContext.analyser.frequencyBinCount);
            source.connect(lipSyncContext.analyser);
            lipSyncContext.analyser.connect(lipSyncContext.audioContext.destination);
            lipSyncContext.initialized = true;
        }
        
        async function preloadAnimations() {
            console.log('Preloading animations...');
            const allAnimationNames = ['idle', ...talkingAnimationNames.map(n => n.split('/').pop())];
            for (const name of allAnimationNames) {
                try {
                    const path = name === 'idle' ? 'animations/idle.fbx' : `animations/${name}.fbx`;
                    const clip = await loadMixamoAnimation(assetPathPrefix + path, currentVrm);
                    clip.name = name; 
                    animationsMap.set(name, clip);
                } catch (error) {
                    console.error(`Error preloading animation ${name}:`, error);
                }
            }
            
            setTimeout(() => {
                const loadingOverlay = document.getElementById('loading-overlay');
                loadingOverlay.classList.add('hidden');
                controlButton.disabled = false;
                controlButton.style.display = 'block';
                statusText.style.display = 'block';
                setupIdleAnimation();
            }, 2000);
        }

        function setupIdleAnimation() {
            const idleClip = animationsMap.get('idle');
            if (!idleClip) return;
            idleAction = mixer.clipAction(idleClip);
            idleAction.play();
            currentAction = idleAction;
        }

        function playRandomTalkingAnimation() {
            if (audioPlayer.paused || !currentAction) return;
            const names = talkingAnimationNames.map(n => n.split('/').pop());
            let nextName;
            do {
                nextName = names[Math.floor(Math.random() * names.length)];
            } while (names.length > 1 && nextName === currentAction.getClip().name);

            const nextClip = animationsMap.get(nextName);
            if (!nextClip) return;
            const nextAction = mixer.clipAction(nextClip);
            nextAction.reset().setLoop(THREE.LoopOnce, 1).play();
            nextAction.clampWhenFinished = true;
            currentAction.crossFadeTo(nextAction, 0.5);
            currentAction = nextAction;
        }

        async function loadVRM(modelUrl) {
            const loader = new GLTFLoader();
            loader.register(parser => new VRMLoaderPlugin(parser));
            try {
                const gltf = await loader.loadAsync(modelUrl);
                currentVrm = gltf.userData.vrm;
                scene.add(currentVrm.scene);
                VRMUtils.rotateVRM0(currentVrm);
                mixer = new THREE.AnimationMixer(currentVrm.scene);
                mixer.addEventListener('finished', (e) => {
                    if (!audioPlayer.paused && talkingAnimationNames.some(n => n.includes(e.action.getClip().name))) {
                        playRandomTalkingAnimation();
                    }
                });
                await preloadAnimations();
            } catch (error) {
                console.error('Error loading VRM:', error);
                document.getElementById('loading-text').innerText = 'Error loading model.';
            }
        }

        // -- Gemini & TTS Integration --
        async function getGeminiResponse(text) {
            updateStatus('Thinking...');
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nUser: " + text }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                console.error('Gemini Error:', e);
                return "عذراً، واجهت مشكلة في التفكير.";
            }
        }

        async function speakText(text) {
            updateStatus('Speaking...');
            // Using Web Speech API for TTS (Direct Browser Support)
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.onstart = () => {
                if (!lipSyncContext.initialized) setupLipSync();
                playRandomTalkingAnimation();
            };
            utterance.onend = () => {
                if (currentAction !== idleAction) {
                    currentAction.crossFadeTo(idleAction.reset().play(), 0.5);
                    currentAction = idleAction;
                }
                updateStatus('Ready');
                controlButton.disabled = false;
            };
            
            // Manual Lip Sync for SpeechSynthesis (Since it doesn't provide frequency data easily)
            const speakInterval = setInterval(() => {
                if (window.speechSynthesis.speaking) {
                    const vol = 0.5 + Math.random() * 0.5;
                    currentVrm.expressionManager.setValue('aa', vol);
                } else {
                    clearInterval(speakInterval);
                    currentVrm.expressionManager.setValue('aa', 0);
                }
            }, 100);

            window.speechSynthesis.speak(utterance);
        }

        function updateStatus(text) {
            statusText.innerText = text;
        }

        if (recognition) {
            recognition.onstart = () => {
                updateStatus('Listening...');
                controlButton.classList.add('recording');
            };
            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                updateStatus('Heard: ' + text);
                controlButton.classList.remove('recording');
                controlButton.disabled = true;
                const aiResponse = await getGeminiResponse(text);
                await speakText(aiResponse);
            };
            recognition.onerror = () => {
                updateStatus('Error hearing you');
                controlButton.classList.remove('recording');
                controlButton.disabled = false;
            };
            recognition.onend = () => {
                controlButton.classList.remove('recording');
            };
        }

        controlButton.addEventListener('click', () => {
            if (recognition) {
                recognition.start();
            } else {
                alert('Speech recognition not supported in this browser.');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);
            if (currentVrm) {
                currentVrm.update(dt);
                const expressionManager = currentVrm.expressionManager;
                blinkManager.timeSinceLastBlink += dt;
                if (blinkManager.isBlinking) {
                    blinkManager.blinkTimer += dt;
                    const progress = blinkManager.blinkTimer / blinkManager.BLINK_DURATION;
                    expressionManager.setValue('blink', Math.sin(Math.PI * progress));
                    if (progress >= 1.0) {
                        blinkManager.isBlinking = false;
                        expressionManager.setValue('blink', 0);
                    }
                } else if (blinkManager.timeSinceLastBlink > blinkManager.nextBlinkTime) {
                    blinkManager.isBlinking = true;
                    blinkManager.blinkTimer = 0;
                    blinkManager.timeSinceLastBlink = 0;
                    scheduleNextBlink();
                }
            }
            if (renderer) renderer.render(scene, camera);
        }

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            scheduleNextBlink();
            new RGBELoader().load(assetPathPrefix + 'backgrounds/background.hdr', function (texture) {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texture;
                scene.environment = texture;
            });
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.4, 2.5);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.2, 0);
            controls.update();
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(1, 1, 1).normalize();
            scene.add(dirLight);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            loadVRM(assetPathPrefix + 'models/waifu.vrm');
            animate();
        }

        init();
    </script>
</body>
</html>
